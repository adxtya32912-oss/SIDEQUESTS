<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIDEQUEST</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne+Mono&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sage: #8FAE8B;
    --sage-light: #B5CCB0;
    --sage-pale: #D4E4D0;
    --sage-xpale: #EBF2E8;
    --beige: #E8DFC8;
    --beige-dark: #C9BA9B;
    --beige-xdark: #A89878;
    --cream: #F5F0E8;
    --black: #1A1A18;
    --black2: #2C2C28;
    --gray: #6B6B65;
    --gray-light: #9B9B92;
    --white: #FAFAF7;
    --danger: #C44B2B;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:var(--cream); color:var(--black); font-family:'Space Grotesk', sans-serif; overflow:hidden; }

  /* NAV */
  #app { display:flex; flex-direction:column; height:100vh; max-width:480px; margin:0 auto; background:var(--white); position:relative; box-shadow:0 0 60px rgba(0,0,0,0.08); }
  #topbar { padding:16px 20px 12px; border-bottom:1px solid var(--beige); display:flex; align-items:center; justify-content:space-between; background:var(--white); flex-shrink:0; }
  #topbar .logo { font-family:'Syne', sans-serif; font-weight:800; font-size:18px; letter-spacing:0.08em; color:var(--black); }
  #topbar .logo span { color:var(--sage); }
  #xp-bar-wrap { height:3px; background:var(--beige); flex-shrink:0; }
  #xp-bar { height:100%; background:var(--sage); transition:width 0.6s cubic-bezier(.4,0,.2,1); }
  #level-badge { font-family:'Syne Mono', monospace; font-size:11px; background:var(--sage); color:var(--white); padding:3px 8px; border-radius:20px; }

  /* TABS */
  #tabs { display:flex; border-bottom:1px solid var(--beige); background:var(--white); flex-shrink:0; overflow-x:auto; scrollbar-width:none; }
  #tabs::-webkit-scrollbar { display:none; }
  .tab-btn { flex:0 0 auto; padding:10px 14px; font-family:'Space Grotesk',sans-serif; font-size:12px; font-weight:500; letter-spacing:0.05em; color:var(--gray); background:none; border:none; cursor:pointer; position:relative; text-transform:uppercase; white-space:nowrap; transition:color .2s; }
  .tab-btn.active { color:var(--black); }
  .tab-btn.active::after { content:''; position:absolute; bottom:0; left:8px; right:8px; height:2px; background:var(--sage); border-radius:2px 2px 0 0; }
  .tab-btn:hover { color:var(--black2); }

  /* SCREENS */
  #screens { flex:1; overflow:hidden; position:relative; }
  .screen { position:absolute; inset:0; overflow-y:auto; padding:20px; opacity:0; pointer-events:none; transform:translateY(8px); transition:opacity .25s ease, transform .25s ease; scrollbar-width:thin; scrollbar-color:var(--beige) transparent; }
  .screen.active { opacity:1; pointer-events:all; transform:translateY(0); }

  /* QUEST CARDS */
  .quest-card { background:var(--white); border:1px solid var(--beige); border-radius:12px; padding:16px; margin-bottom:12px; cursor:pointer; transition:all .2s; position:relative; overflow:hidden; }
  .quest-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--sage); border-radius:3px 0 0 3px; opacity:0; transition:opacity .2s; }
  .quest-card:hover { border-color:var(--sage-light); transform:translateY(-1px); box-shadow:0 4px 16px rgba(143,174,139,0.12); }
  .quest-card:hover::before { opacity:1; }
  .quest-card.completed { background:var(--sage-xpale); border-color:var(--sage-pale); }
  .quest-card.completed::before { opacity:1; background:var(--sage); }
  .quest-meta { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .cat-tag { font-size:10px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; padding:3px 8px; border-radius:20px; }
  .cat-ADVENTURE { background:#DCEEFF; color:#1A5C9A; }
  .cat-SKILLS { background:#E8F5E2; color:#2D6B27; }
  .cat-SOCIAL { background:#FFF0DC; color:#8A5A1A; }
  .cat-URBAN { background:#EEE8FF; color:#5A2D8A; }
  .cat-MIND { background:#FFE8F0; color:#8A1A4A; }
  .cat-CHAOS { background:#FFE8E0; color:#8A2D1A; }
  .xp-tag { font-family:'Syne Mono', monospace; font-size:11px; color:var(--gray); margin-left:auto; }
  .xp-tag.high { color:var(--danger); font-weight:600; }
  .quest-title { font-size:15px; font-weight:500; line-height:1.4; color:var(--black); }
  .quest-desc { font-size:13px; color:var(--gray); margin-top:6px; line-height:1.5; }
  .quest-actions { display:flex; gap:8px; margin-top:12px; }
  .btn-sm { font-family:'Space Grotesk',sans-serif; font-size:12px; font-weight:500; padding:7px 14px; border-radius:8px; border:1px solid var(--beige); background:none; cursor:pointer; transition:all .15s; color:var(--black); }
  .btn-sm:hover { background:var(--beige); }
  .btn-sm.primary { background:var(--sage); border-color:var(--sage); color:var(--white); }
  .btn-sm.primary:hover { background:var(--sage-light); }
  .btn-sm.done { background:var(--beige); color:var(--gray); }

  /* FILTER ROW */
  .filter-row { display:flex; gap:8px; margin-bottom:16px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
  .filter-row::-webkit-scrollbar { display:none; }
  .filter-pill { flex:0 0 auto; font-size:11px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; padding:5px 12px; border-radius:20px; border:1px solid var(--beige); background:none; cursor:pointer; color:var(--gray); transition:all .15s; }
  .filter-pill.active { background:var(--black); color:var(--white); border-color:var(--black); }
  .filter-pill:hover:not(.active) { border-color:var(--beige-dark); color:var(--black); }

  /* MODAL */
  #modal-overlay { position:absolute; inset:0; background:rgba(26,26,24,0.6); z-index:100; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity .25s; backdrop-filter:blur(2px); }
  #modal-overlay.open { opacity:1; pointer-events:all; }
  #modal { background:var(--white); border-radius:20px 20px 0 0; padding:24px 20px; width:100%; max-height:85vh; overflow-y:auto; transform:translateY(20px); transition:transform .3s cubic-bezier(.4,0,.2,1); }
  #modal-overlay.open #modal { transform:translateY(0); }
  .modal-handle { width:36px; height:3px; background:var(--beige-dark); border-radius:2px; margin:0 auto 20px; }
  .modal-cat { font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:8px; }
  .modal-title { font-family:'Syne', sans-serif; font-size:20px; font-weight:700; line-height:1.3; margin-bottom:12px; }
  .modal-desc { font-size:14px; color:var(--gray); line-height:1.6; margin-bottom:16px; }
  .modal-xp-row { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
  .xp-big { font-family:'Syne Mono', monospace; font-size:22px; color:var(--sage); font-weight:600; }
  .diff-label { font-size:12px; color:var(--gray); }
  .modal-actions { display:flex; flex-direction:column; gap:10px; }
  .btn-full { width:100%; font-family:'Space Grotesk',sans-serif; font-size:14px; font-weight:600; padding:14px; border-radius:12px; border:1px solid var(--beige); background:none; cursor:pointer; transition:all .2s; color:var(--black); }
  .btn-full.primary { background:var(--sage); border-color:var(--sage); color:var(--white); }
  .btn-full.primary:hover { background:var(--sage-light); }
  .btn-full:hover:not(.primary) { background:var(--beige); }
  .memory-section { margin-top:20px; border-top:1px solid var(--beige); padding-top:16px; }
  .memory-label { font-size:12px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--gray); margin-bottom:10px; }
  .memory-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:10px; }
  .memory-thumb { aspect-ratio:1; border-radius:8px; object-fit:cover; width:100%; cursor:pointer; }
  .memory-thumb-video { aspect-ratio:1; border-radius:8px; background:var(--black2); display:flex; align-items:center; justify-content:center; color:var(--white); font-size:22px; cursor:pointer; }
  .memory-upload-btn { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--sage); background:none; border:1px dashed var(--sage-light); border-radius:8px; padding:10px 14px; cursor:pointer; width:100%; justify-content:center; }
  .memory-upload-btn:hover { background:var(--sage-xpale); }

  /* LEVELS SCREEN */
  .level-hero { text-align:center; padding:24px 0 20px; }
  .level-number { font-family:'Syne', sans-serif; font-size:64px; font-weight:800; color:var(--sage); line-height:1; }
  .level-title-text { font-family:'Syne', sans-serif; font-size:16px; font-weight:600; color:var(--black); margin-top:4px; }
  .xp-progress-wrap { background:var(--beige); border-radius:8px; height:8px; margin:16px 0 8px; overflow:hidden; }
  .xp-progress-bar { height:100%; background:var(--sage); border-radius:8px; transition:width .8s cubic-bezier(.4,0,.2,1); }
  .xp-label { font-family:'Syne Mono', monospace; font-size:12px; color:var(--gray); text-align:center; }
  .stats-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:20px 0; }
  .stat-box { background:var(--cream); border:1px solid var(--beige); border-radius:12px; padding:14px; text-align:center; }
  .stat-num { font-family:'Syne Mono', monospace; font-size:24px; font-weight:700; color:var(--black); }
  .stat-lbl { font-size:11px; color:var(--gray); text-transform:uppercase; letter-spacing:0.06em; margin-top:2px; }
  .level-list { }
  .level-row { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--beige); }
  .level-row:last-child { border-bottom:none; }
  .lv-circle { width:36px; height:36px; border-radius:50%; border:2px solid var(--beige-dark); display:flex; align-items:center; justify-content:center; font-family:'Syne Mono', monospace; font-size:13px; font-weight:700; color:var(--gray); flex-shrink:0; }
  .lv-circle.reached { border-color:var(--sage); background:var(--sage); color:var(--white); }
  .lv-circle.current { border-color:var(--sage); color:var(--sage); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(143,174,139,0.4)} 50%{box-shadow:0 0 0 6px rgba(143,174,139,0)} }
  .lv-info { flex:1; }
  .lv-name { font-size:14px; font-weight:500; }
  .lv-xp { font-family:'Syne Mono', monospace; font-size:12px; color:var(--gray); }

  /* STATS SCREEN */
  .chart-wrap { background:var(--cream); border:1px solid var(--beige); border-radius:14px; padding:18px; margin-bottom:16px; }
  .chart-title { font-size:12px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--gray); margin-bottom:14px; }
  .bar-chart { display:flex; flex-direction:column; gap:10px; }
  .bar-row { display:flex; align-items:center; gap:10px; }
  .bar-label { font-size:12px; font-weight:500; width:80px; flex-shrink:0; color:var(--black); }
  .bar-track { flex:1; height:10px; background:var(--beige); border-radius:10px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:10px; transition:width 1s cubic-bezier(.4,0,.2,1); }
  .bar-count { font-family:'Syne Mono', monospace; font-size:12px; color:var(--gray); width:28px; text-align:right; flex-shrink:0; }
  .radar-svg { display:block; margin:0 auto; }
  .section-h { font-family:'Syne', sans-serif; font-size:14px; font-weight:700; letter-spacing:0.04em; margin-bottom:12px; color:var(--black); }
  .recent-list { }
  .recent-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px dashed var(--beige); }
  .recent-item:last-child { border-bottom:none; }
  .recent-dot { width:8px; height:8px; border-radius:50%; background:var(--sage); flex-shrink:0; }
  .recent-name { font-size:13px; flex:1; color:var(--black); }
  .recent-xp { font-family:'Syne Mono', monospace; font-size:12px; color:var(--sage); }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:48px 20px; color:var(--gray); }
  .empty-state .big-icon { font-size:48px; margin-bottom:12px; opacity:0.4; }
  .empty-state p { font-size:14px; line-height:1.6; }

  /* TOAST */
  #toast { position:absolute; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--black); color:var(--white); font-size:13px; font-weight:500; padding:10px 18px; border-radius:20px; opacity:0; pointer-events:none; transition:all .3s; white-space:nowrap; z-index:200; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* SCROLLBAR */
  .screen::-webkit-scrollbar { width:3px; }
  .screen::-webkit-scrollbar-thumb { background:var(--beige-dark); border-radius:2px; }

  /* SECTION HEADER */
  .sec-header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:14px; }
  .sec-header h2 { font-family:'Syne', sans-serif; font-size:17px; font-weight:700; }
  .sec-header .count { font-family:'Syne Mono', monospace; font-size:12px; color:var(--gray); }

  /* QUEST SHUFFLE BTN */
  .shuffle-btn { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:var(--sage); background:var(--sage-xpale); border:none; border-radius:20px; padding:7px 14px; cursor:pointer; letter-spacing:0.04em; transition:all .15s; margin-bottom:14px; }
  .shuffle-btn:hover { background:var(--sage-pale); }
  .shuffle-btn svg { transition:transform .4s; }
  .shuffle-btn:hover svg { transform:rotate(180deg); }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="logo">SIDE<span>QUEST</span></div>
    <div id="level-badge">LVL 1</div>
  </div>
  <div id="xp-bar-wrap"><div id="xp-bar" style="width:0%"></div></div>

  <div id="tabs">
    <button class="tab-btn active" onclick="showTab('quests')">Quests</button>
    <button class="tab-btn" onclick="showTab('active')">Active</button>
    <button class="tab-btn" onclick="showTab('completed')">Completed</button>
    <button class="tab-btn" onclick="showTab('stats')">Stats</button>
    <button class="tab-btn" onclick="showTab('levels')">Levels</button>
  </div>

  <div id="screens">

    <!-- QUESTS TAB -->
    <div class="screen active" id="screen-quests">
      <div class="sec-header">
        <h2>Today's Quests</h2>
        <span class="count" id="quest-count">0 quests</span>
      </div>
      <div class="filter-row" id="filter-row">
        <button class="filter-pill active" onclick="filterCat('ALL')">All</button>
        <button class="filter-pill" onclick="filterCat('ADVENTURE')">Adventure</button>
        <button class="filter-pill" onclick="filterCat('SKILLS')">Skills</button>
        <button class="filter-pill" onclick="filterCat('SOCIAL')">Social</button>
        <button class="filter-pill" onclick="filterCat('URBAN')">Urban</button>
        <button class="filter-pill" onclick="filterCat('MIND')">Mind</button>
        <button class="filter-pill" onclick="filterCat('CHAOS')">Chaos</button>
      </div>
      <button class="shuffle-btn" onclick="shuffleQuests()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6"/></svg>
        Shuffle
      </button>
      <div id="quest-list"></div>
    </div>

    <!-- ACTIVE TAB -->
    <div class="screen" id="screen-active">
      <div class="sec-header"><h2>Active Quests</h2><span class="count" id="active-count">0</span></div>
      <div id="active-list"></div>
    </div>

    <!-- COMPLETED TAB -->
    <div class="screen" id="screen-completed">
      <div class="sec-header"><h2>Completed</h2><span class="count" id="completed-count">0</span></div>
      <div id="completed-list"></div>
    </div>

    <!-- STATS TAB -->
    <div class="screen" id="screen-stats">
      <div class="chart-wrap">
        <div class="chart-title">Quests by category</div>
        <div class="bar-chart" id="cat-bar-chart"></div>
      </div>
      <div class="chart-wrap">
        <div class="chart-title">XP earned over time</div>
        <canvas id="xp-chart" height="120" style="width:100%"></canvas>
      </div>
      <div class="section-h">Recently Completed</div>
      <div id="recent-completed" class="recent-list"></div>
    </div>

    <!-- LEVELS TAB -->
    <div class="screen" id="screen-levels">
      <div class="level-hero">
        <div class="level-number" id="lv-big">1</div>
        <div class="level-title-text" id="lv-title">Wanderer</div>
        <div class="xp-progress-wrap"><div class="xp-progress-bar" id="lv-progress" style="width:0%"></div></div>
        <div class="xp-label" id="lv-xp-label">0 / 100 XP</div>
      </div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num" id="stat-total-xp">0</div><div class="stat-lbl">Total XP</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-done">0</div><div class="stat-lbl">Completed</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-streak">0</div><div class="stat-lbl">Day Streak</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-cats">0</div><div class="stat-lbl">Categories</div></div>
      </div>
      <div class="section-h">Level Roadmap</div>
      <div class="level-list" id="level-list"></div>
    </div>

  </div><!-- /screens -->

  <!-- QUEST DETAIL MODAL -->
  <div id="modal-overlay" onclick="closeModal(event)">
    <div id="modal">
      <div class="modal-handle"></div>
      <div class="modal-cat" id="m-cat"></div>
      <div class="modal-title" id="m-title"></div>
      <div class="modal-desc" id="m-desc"></div>
      <div class="modal-xp-row">
        <div class="xp-big" id="m-xp"></div>
        <div class="diff-label" id="m-diff"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-full primary" id="m-accept-btn" onclick="acceptQuest()">Accept Quest</button>
        <button class="btn-full" id="m-done-btn" onclick="completeQuest()" style="display:none">Mark Complete ✓</button>
        <button class="btn-full" onclick="closeModal()">Close</button>
      </div>
      <div class="memory-section" id="memory-section" style="display:none">
        <div class="memory-label">Memories</div>
        <div class="memory-grid" id="memory-grid"></div>
        <label class="memory-upload-btn">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          Add photo / video
          <input type="file" accept="image/*,video/*" multiple style="display:none" onchange="addMemory(event)">
        </label>
      </div>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script>
// =====================================================================
// DATA
// =====================================================================

const LEVELS = [
  {lvl:1,name:"Wanderer",xp:0},
  {lvl:2,name:"Drifter",xp:100},
  {lvl:3,name:"Scout",xp:250},
  {lvl:4,name:"Pathfinder",xp:500},
  {lvl:5,name:"Trickster",xp:900},
  {lvl:6,name:"Maverick",xp:1400},
  {lvl:7,name:"Renegade",xp:2000},
  {lvl:8,name:"Phantom",xp:2800},
  {lvl:9,name:"Ghost",xp:3800},
  {lvl:10,name:"Legend",xp:5000},
  {lvl:11,name:"Apex Drifter",xp:6500},
  {lvl:12,name:"Chaos Agent",xp:8500},
  {lvl:13,name:"Urban Myth",xp:11000},
  {lvl:14,name:"The One",xp:14000},
  {lvl:15,name:"SIDEQUEST MASTER",xp:18000},
];

const CAT_COLORS = {
  ADVENTURE:'#378ADD', SKILLS:'#639922', SOCIAL:'#BA7517',
  URBAN:'#7F77DD', MIND:'#D4537E', CHAOS:'#D85A30'
};

// =====================================================================
// QUEST DATABASE - 1000+ unique quests with detailed instructions
// =====================================================================
const RAW_QUESTS = [
// ADVENTURE ────────────────────────────────────────────────────────
{t:"Explore an abandoned building",d:"Find a derelict spot. Get in safely — wear sturdy boots, bring a flashlight. Document what you see inside: peeling paint, old furniture, weird graffiti. Collect one cool story from a local about what happened there. Don't trespass anywhere actively guarded.",c:"ADVENTURE",xp:80,diff:"Hard"},
{t:"Ride a freight elevator",d:"Find an old industrial building with a manual freight elevator still in operation. Charm or barter your way into riding it at least twice — once going up, once going down. Feel the rumble of vintage machinery.",c:"ADVENTURE",xp:30,diff:"Easy"},
{t:"Go cliff jumping",d:"Find a safe cliff above deep water — at least 4 metres high. Confirm the depth below with a local or by checking first. Work up the nerve. Jump feet-first, arms crossed. Bonus points for screaming on the way down.",c:"ADVENTURE",xp:100,diff:"Hard"},
{t:"Spend a night stargazing alone",d:"Drive or hike to somewhere with zero light pollution — at least 30km from any city. Lie flat on your back for 2+ hours. Learn the names of 5 constellations while you're there. No phone screen for the whole session.",c:"ADVENTURE",xp:50,diff:"Medium"},
{t:"Ride a wheelbarrow full speed downhill",d:"Find a grassy hill with no obstacles. Get a trusted friend to push you in a real wheelbarrow as fast as humanly possible. Hold on. Do not tip. Repeat until someone's laughing too hard to continue.",c:"ADVENTURE",xp:40,diff:"Medium"},
{t:"Build a raft and float it",d:"Gather scrap wood, plastic barrels, rope, inner tubes — whatever floats. Build a raft sturdy enough to hold you. Actually float on it across a pond, lake, or slow river. Document whether it survives the journey.",c:"ADVENTURE",xp:90,diff:"Hard"},
{t:"Hike somewhere you've never been at sunrise",d:"Wake up before 4am. Drive to a trailhead you've never visited. Be at the summit or viewpoint exactly as the sun crests the horizon. Eat breakfast up there. No sleeping in permitted.",c:"ADVENTURE",xp:60,diff:"Medium"},
{t:"Go night swimming somewhere wild",d:"Not a pool. A lake, ocean, quarry, or river after dark. Feel the strange energy of being in open water at night when you can't see the bottom. Bring one friend for safety. Stay in at least 15 minutes.",c:"ADVENTURE",xp:70,diff:"Medium"},
{t:"Find the highest natural point near your city",d:"Look up the tallest hill, peak, or ridge within 50km. Get to the absolute top — not the car park, not the viewpoint deck. The actual highest ground. Document the view in every direction.",c:"ADVENTURE",xp:50,diff:"Medium"},
{t:"Kayak somewhere you'd normally drive",d:"Rent or borrow a kayak. Navigate a river or canal from point A to point B that you've driven alongside a hundred times. See your familiar route from water level. Wave at confused drivers.",c:"ADVENTURE",xp:80,diff:"Hard"},
{t:"Spend a night in the woods with no tent",d:"Hammock, tarp, or bivy sack only. No tent poles, no zippered doors. Sleep under open sky or forest canopy in actual wilderness. Listen to every sound. Wake with the birds.",c:"ADVENTURE",xp:90,diff:"Hard"},
{t:"Follow a river to its source",d:"Pick any river, stream, or creek near you. Walk upstream — for hours if needed — until you find where it begins. A spring, a marsh, a pipe. Document the exact spot. Drink from it if safe.",c:"ADVENTURE",xp:70,diff:"Medium"},
{t:"Scramble up a boulder field",d:"Find a rocky hillside or talus slope without a trail. Climb using hands and feet, testing every rock before committing weight. Go higher than feels comfortable. Stop at the top and look back down.",c:"ADVENTURE",xp:60,diff:"Medium"},
{t:"Ride a horse for the first time",d:"Find a local stable offering trail rides or lessons. Ride an actual horse — not a pony led by a handler — at a trot or canter. Post to the trot. Feel what it's like to move with a large animal.",c:"ADVENTURE",xp:50,diff:"Medium"},
{t:"Go caving",d:"Find a local cave system — guided or wild. If guided, go to the deepest accessible point. If wild, bring proper lights and a buddy. Crawl through at least one tight passage. Turn off all lights for 2 minutes of absolute darkness.",c:"ADVENTURE",xp:80,diff:"Hard"},
{t:"Zipline between two points",d:"Find a zipline course, outdoor adventure centre, or build a safe one between two sturdy trees. Travel from A to B above the ground. Let go of the handles for at least 3 seconds. Scream optional.",c:"ADVENTURE",xp:60,diff:"Medium"},
{t:"Jump from a bridge into water",d:"Find a legal, known-safe bridge jumping spot. Confirm depth — at least 3 metres — and absence of submerged objects. Jump at least three times. On the third jump, don't hesitate at all.",c:"ADVENTURE",xp:70,diff:"Medium"},
{t:"Get lost on purpose in a forest",d:"Enter a forest without a phone or map. Walk for 30 minutes in a deliberately random direction, making mental notes of landmarks. Then navigate yourself back out using only what you observed. No compass.",c:"ADVENTURE",xp:80,diff:"Hard"},
{t:"Sandboard down a sand dune",d:"Find a tall sand dune — coastal or desert. Use a proper sandboard, a snowboard, a boogie board, or even a flattened cardboard box. Go down standing if you can. Fall dramatically at least once.",c:"ADVENTURE",xp:60,diff:"Medium"},
{t:"Go storm chasing in your car",d:"When a big storm rolls in, drive toward it instead of away. Park at a safe elevated point with a clear view. Watch lightning strike the ground. Count the seconds between flash and thunder. Feel small.",c:"ADVENTURE",xp:60,diff:"Medium"},
{t:"Find and swim in a natural waterfall pool",d:"Research and locate a real waterfall with a pool deep enough to swim in. Hike there. Get in the water. Swim under the falling water. Feel the weight of the cascade on your shoulders.",c:"ADVENTURE",xp:70,diff:"Medium"},
{t:"Explore your city's underground",d:"Research stormwater tunnels, old steam tunnels, abandoned cellar networks, or catacombs near you. Find legal access to at least one. Document what's down there. Come back with one story you didn't know before.",c:"ADVENTURE",xp:90,diff:"Hard"},
{t:"Ride in a helicopter",d:"Find a local scenic helicopter tour — often cheaper than you think for a 10-15 minute flight. Go up. Look straight down at the ground. Feel the weirdness of hovering with nothing below you.",c:"ADVENTURE",xp:100,diff:"Hard"},
{t:"Rappel down a cliff face",d:"Sign up for an intro abseiling course or find an experienced friend with gear. Go over the edge of something real — at least 15 metres. Lean back into the harness. Trust the rope. Walk backwards down the rock.",c:"ADVENTURE",xp:90,diff:"Hard"},
{t:"Do an overnight canoe trip",d:"Canoe from a put-in point to a different take-out point downstream. Camp one night on the riverbank. Cook your dinner over a fire. Paddle the entire distance — no motors allowed.",c:"ADVENTURE",xp:100,diff:"Hard"},
{t:"Cross a gorge on a rope bridge",d:"Find a gorge, canyon, or ravine with a rope or suspension bridge. Walk across it without holding the rails. Stop in the middle and look down. If it swings, let it swing.",c:"ADVENTURE",xp:50,diff:"Medium"},
{t:"Skateboard a hill you've been scared of",d:"Pick a hill that has always felt too fast or too steep. Skate it from top to bottom without bailing or foot-braking. Full commitment. Wear pads. Do it before the fear talks you out of it.",c:"ADVENTURE",xp:60,diff:"Medium"},
{t:"Go night cycling through your city",d:"At 2–3am, cycle through every distinct neighbourhood in your city. Go somewhere you've never been on foot or by day. Notice how different the familiar streets look under streetlights and silence.",c:"ADVENTURE",xp:50,diff:"Medium"},
{t:"Take a cold plunge in open water in winter",d:"January or February. Find a lake, river, or sea. Get in up to your neck. Stay in for 60 seconds minimum — no cheating. Feel your body panic, then calm. Do it with at least one other person for safety.",c:"ADVENTURE",xp:70,diff:"Medium"},
{t:"Sleep on a rooftop",d:"A legal, accessible rooftop — yours, a friend's, a hostel with roof access. Set up a sleeping bag, mat, and pillow. Spend the entire night under the sky. Wake up to the sunrise from above the city.",c:"ADVENTURE",xp:50,diff:"Medium"},
{t:"Swim in the ocean at midnight",d:"Not a lit beach resort. A real ocean, real midnight, ideally with phosphorescence. Alone or with one trusted person. Float on your back and look at the stars from sea level. Stay in at least 20 minutes.",c:"ADVENTURE",xp:70,diff:"Medium"},
{t:"Take a road trip with no destination",d:"Get in the car with a full tank. Drive in whatever direction feels right. No GPS, no destination. When the tank hits half, figure out where you are and find your way home. Eat at the most interesting place you pass.",c:"ADVENTURE",xp:60,diff:"Medium"},
{t:"Climb a water tower",d:"Find an old water tower. If it's legally accessible, climb to the top. If not, find one with a viewing platform or public access. Get as high as you can and look out over the landscape.",c:"ADVENTURE",xp:70,diff:"Medium"},
{t:"Bodysurf a wave",d:"No board, no fins — just your body. Find real ocean waves. Catch at least 5 proper bodysurf rides in one session where the wave carries you all the way to shore. Feel the ocean push you.",c:"ADVENTURE",xp:50,diff:"Medium"},
{t:"Spend 24 hours in a stranger's city",d:"Pick a city within 4 hours that you've never visited. Leave at sunrise. Don't plan anything. Ask locals where to go. Return at midnight. Fill 24 hours with pure discovery.",c:"ADVENTURE",xp:90,diff:"Hard"},
{t:"Paraglide off a hill",d:"Tandem or solo. Find a paragliding school or operator. Run off a hill and feel the wing catch the air. Look down at the world getting smaller. Stay up as long as the conditions allow.",c:"ADVENTURE",xp:100,diff:"Hard"},
{t:"Build and light a proper campfire",d:"No firestarters, no lighter fluid. Use flint and steel, a bow drill, or a single match with only natural tinder you gathered yourself. Build a fire that burns steadily for over an hour. Cook something on it.",c:"ADVENTURE",xp:60,diff:"Medium"},
{t:"Find and document a ghost town",d:"Research an abandoned settlement within driving distance. Go there. Photograph every structure still standing. Find and record one story from a local or historical source about what happened to the town.",c:"ADVENTURE",xp:70,diff:"Medium"},
{t:"Hike a section of a long-distance trail",d:"Find the nearest long-distance trail — Appalachian, Pacific Crest, Camino, or your local equivalent. Hike a full 25km section in one day. Sign the trail register if there is one.",c:"ADVENTURE",xp:80,diff:"Hard"},
{t:"Camp on a beach",d:"Find a beach where overnight camping is legal. Set up your tent or bivy above the high-tide line. Fall asleep to the sound of waves. Wake up and walk straight into the ocean.",c:"ADVENTURE",xp:60,diff:"Medium"},
{t:"Go volcano hiking",d:"Find a dormant or active volcano you can legally hike. Climb to the rim or summit. Look into the crater. Feel the heat if it's active. Understand that you're standing on a geological force.",c:"ADVENTURE",xp:90,diff:"Hard"},
{t:"Ride a mountain bike down a real trail",d:"Not a paved path. A proper mountain bike trail with rocks, roots, and features. Ride it at speed. Get at least a little airborne. Accept that you might fall.",c:"ADVENTURE",xp:70,diff:"Medium"},
{t:"Do a multi-pitch climb",d:"With a guide or experienced partner. Climb a route that requires at least two pitches — stopping at a belay station mid-climb. Look down at how far you've come between pitches.",c:"ADVENTURE",xp:100,diff:"Hard"},
{t:"Snorkel in open ocean",d:"Not a sheltered lagoon. Real open water with depth below you. Find reef, rocks, or marine life. Float face-down for at least 30 minutes. See something you can't identify.",c:"ADVENTURE",xp:60,diff:"Medium"},
{t:"Walk across a frozen lake",d:"In proper winter conditions with confirmed safe ice thickness (at least 10cm). Walk from one shore to the other. Stop in the middle. Listen to the ice creak and sing beneath your feet.",c:"ADVENTURE",xp:70,diff:"Medium"},
{t:"Go tobogganing as an adult",d:"Find a proper sledding hill. Use a real toboggan, sled, or improvised slider. Go down at least 10 times. Race someone. Walk back up every time — no tow rope.",c:"ADVENTURE",xp:30,diff:"Easy"},
{t:"Explore a sea cave",d:"By kayak, boat, or swimming. Find a sea cave accessible from the water. Go inside. Listen to the echo of waves in the chamber. Watch the light play on the walls.",c:"ADVENTURE",xp:70,diff:"Medium"},
{t:"Run a trail race",d:"Sign up for any organised trail run — 5k, 10k, or longer. Train for at least 3 weeks. Show up on race day. Run through mud, over roots, up hills. Cross the finish line.",c:"ADVENTURE",xp:80,diff:"Hard"},
{t:"Hike to a hot spring",d:"Find a natural hot spring accessible only by hiking. Walk in. Soak for at least an hour. Appreciate that the earth heated this water for you.",c:"ADVENTURE",xp:50,diff:"Medium"},
{t:"Sleep in a bothy or wilderness hut",d:"Find a free, open-access wilderness shelter. Hike there with your gear. Spend the night. Share the space with any strangers who arrive. Leave it cleaner than you found it.",c:"ADVENTURE",xp:60,diff:"Medium"},
{t:"Do a polar bear plunge",d:"In winter or early spring. Find the coldest water available — preferably with ice still on it. Run in, full immersion, run out. No wetsuit. Feel more alive than you have all year.",c:"ADVENTURE",xp:60,diff:"Medium"},
{t:"Bivouac on a mountain summit",d:"Hike up in the afternoon. Sleep on the summit with minimal shelter — just a bivy bag or sleeping bag. Wake up above the clouds if you're lucky. Watch the sunrise from the highest point around.",c:"ADVENTURE",xp:90,diff:"Hard"},
{t:"Cross a country border on foot",d:"Find a legal pedestrian border crossing. Walk from one country into another. Get your passport stamped. Feel the oddity of crossing an invisible line that changes everything.",c:"ADVENTURE",xp:40,diff:"Easy"},
{t:"Swim with wild dolphins or seals",d:"Find a location where wild marine mammals are known to approach swimmers. Get in the water. Let them come to you. Don't chase. Just be present in their world for a while.",c:"ADVENTURE",xp:80,diff:"Hard"},
{t:"Go ice climbing",d:"With a guide or experienced partner. Climb a frozen waterfall or ice wall using crampons and ice tools. Swing the axe, kick in the front points, move upward on vertical ice.",c:"ADVENTURE",xp:100,diff:"Hard"},
{t:"Take a ferry to an island you've never visited",d:"Find an island accessible by public ferry. Go there for the day or overnight. Explore every accessible part. Talk to someone who lives there full-time.",c:"ADVENTURE",xp:50,diff:"Medium"},
{t:"Ride a longboard down a coastal road",d:"Find a smooth, gently sloping coastal road with a dedicated bike lane or low traffic. Longboard from the top to the bottom. Feel the ocean wind. Carve wide turns.",c:"ADVENTURE",xp:50,diff:"Medium"},
{t:"Do an adventure race",d:"Sign up for a sprint adventure race — trekking, biking, kayaking, navigation. Race as a team. Get lost, get found, get muddy. Cross the finish line together.",c:"ADVENTURE",xp:100,diff:"Hard"},
{t:"Go mushroom foraging",d:"With an experienced guide or after serious study. Find and correctly identify at least 3 edible wild mushroom species. Cook them over a fire. Eat them with confidence.",c:"ADVENTURE",xp:70,diff:"Medium"},
{t:"Explore a slot canyon",d:"Find a narrow slot canyon — the kind where you have to turn sideways to pass. Walk through it. Look up at the thin strip of sky above. Feel the cool stone against your palms.",c:"ADVENTURE",xp:70,diff:"Medium"},
{t:"Float down a river on an inner tube",d:"Find a slow, safe river. Get a proper river tube. Float for at least 3 hours with friends. Bring a waterproof speaker or just listen to the water. Get out at a different point than you got in.",c:"ADVENTURE",xp:40,diff:"Easy"},
{t:"Go wild swimming in winter",d:"No wetsuit. Find a lake, river, or sea in December through February. Get in. Stay in for at least 2 minutes. Feel the cold shock, then the strange warmth that follows.",c:"ADVENTURE",xp:60,diff:"Medium"},
{t:"Complete a via ferrata",d:"Find a via ferrata route — a protected climbing path with steel cables and rungs. Clip in and traverse along a cliff face. Look down. Keep moving. Reach the end.",c:"ADVENTURE",xp:80,diff:"Hard"},
{t:"Camp in a national park's backcountry",d:"Get the permit. Pack everything you need. Hike at least 5km from the nearest road. Camp somewhere no one else is camping. Follow Leave No Trace principles perfectly.",c:"ADVENTURE",xp:80,diff:"Hard"},
{t:"Ride a cable car up a mountain",d:"Find a mountain with a cable car or gondola. Ride it to the top. Step out into thin air. Hike around at altitude. Ride it back down — or hike down if you're feeling it.",c:"ADVENTURE",xp:30,diff:"Easy"},
{t:"Explore a lava tube",d:"Find a lava tube cave — there are many in volcanic regions. Go inside with proper lights. Walk the length of it. Touch the rippled walls where molten rock once flowed.",c:"ADVENTURE",xp:60,diff:"Medium"},
{t:"Kayak in bioluminescent water",d:"Find a location known for bioluminescence — certain bays in Puerto Rico, Thailand, or the Maldives, or seasonal blooms elsewhere. Paddle through water that glows with every stroke. Drag your hand through the light.",c:"ADVENTURE",xp:90,diff:"Hard"},
{t:"Hike the tallest mountain in your country",d:"Or your state/province. Research the route. Train for it. Summit on a clear day. Sign the register at the top. Take the photo. Descend safely.",c:"ADVENTURE",xp:100,diff:"Hard"},
{t:"Sleep suspended in a hammock over water",d:"Find two trees or anchors over a lake, pond, or calm river. Set up a hammock directly above the water. Sleep through the night swinging gently. Don't fall in.",c:"ADVENTURE",xp:70,diff:"Medium"},
{t:"Go coasteering",d:"Find a rocky coastline. Traverse it by climbing, scrambling, swimming, and jumping — no path, just the interface of land and sea. Wear appropriate gear. Go with someone who knows the route.",c:"ADVENTURE",xp:90,diff:"Hard"},
{t:"Visit every state park in your state",d:"Map them all. Visit each one, even if just for an hour. Document what makes each park unique. This quest takes as long as it takes.",c:"ADVENTURE",xp:100,diff:"Hard"},
{t:"Do a sunrise-to-sunset hike",d:"Start hiking at civil twilight — about 30 minutes before sunrise. Keep hiking until civil twilight in the evening. Cover as much ground as you can. Eat all your meals on the trail.",c:"ADVENTURE",xp:90,diff:"Hard"},
{t:"Go on a multi-day packrafting trip",d:"Combine backpacking and packrafting. Hike into the wilderness carrying an inflatable raft. Paddle across lakes or down rivers. Hike out. Self-supported the whole way.",c:"ADVENTURE",xp:100,diff:"Hard"},
{t:"Find and photograph 10 waterfalls in one day",d:"Research a region dense with waterfalls. Map the most efficient route. Visit and photograph 10 distinct waterfalls between sunrise and sunset. Each one must have visible flowing water.",c:"ADVENTURE",xp:80,diff:"Hard"},
{t:"Cross a desert on foot",d:"A section of desert — 20km minimum. Carry all your water. Navigate by map and compass or GPS. Feel the scale of an empty landscape. Finish at a predetermined point.",c:"ADVENTURE",xp:90,diff:"Hard"},
{t:"Sleep in a treehouse",d:"Not a kid's playhouse. Find a real, adult-accessible treehouse — rentable ones exist. Sleep elevated among branches. Listen to the tree move in the wind.",c:"ADVENTURE",xp:40,diff:"Easy"},
{t:"Go snowshoeing to a remote cabin",d:"Rent snowshoes. Find a trail to a backcountry cabin or yurt that's only accessible in winter. Snowshoe in. Spend the night. Snowshoe out.",c:"ADVENTURE",xp:70,diff:"Medium"},
{t:"Swim across a river",d:"Find a safe, swimmable river crossing — check current and depth. Swim from one bank to the other. Feel the river's push. Climb out on the far side.",c:"ADVENTURE",xp:50,diff:"Medium"},
{t:"Do a multi-day horse trek",d:"Book a multi-day horse trek with an outfitter. Ride through wilderness for 2+ days. Care for your horse. Sleep at camp. Cover real distance on horseback.",c:"ADVENTURE",xp:90,diff:"Hard"},
{t:"Stand on a continental divide",d:"Find the nearest continental divide — the line where water flows to different oceans. Stand with one foot on each side. Pour water and watch it choose its destiny.",c:"ADVENTURE",xp:40,diff:"Easy"},
{t:"Explore an iceberg",d:"By kayak or boat in a region with icebergs — Alaska, Greenland, Iceland, Patagonia. Get close enough to see the blue heart of ancient ice. Listen to it crack and shift.",c:"ADVENTURE",xp:100,diff:"Hard"},
{t:"Witness a total solar eclipse",d:"Plan ahead — check eclipse schedules. Travel to the path of totality. Stand in the shadow of the moon. Experience the eerie daylight-to-darkness in minutes.",c:"ADVENTURE",xp:80,diff:"Hard"},
{t:"Bivy on a beach with no tent",d:"Sleeping bag directly on sand. No shelter above you. Fall asleep watching stars and listening to waves. Wake up covered in salt spray and dew.",c:"ADVENTURE",xp:50,diff:"Medium"},
{t:"Complete an orienteering course",d:"Find a local orienteering club. Run or walk a full course using only map and compass. Find every checkpoint. Record your time. Beat at least one other person.",c:"ADVENTURE",xp:60,diff:"Medium"},
{t:"Go dog sledding",d:"Find a dog sledding operator. Ride the runners behind a team of huskies through snow. Feel the power of dogs who were born to run. Thank each one.",c:"ADVENTURE",xp:70,diff:"Medium"},
{t:"Hike in a different country",d:"Cross a border specifically to hike. Research a trail in a neighbouring country. Do the hike. Notice what's different about the landscape, the trail markers, the air.",c:"ADVENTURE",xp:60,diff:"Medium"},
{t:"Go on a wild edible plant walk",d:"With a knowledgeable forager. Walk through forest or field. Identify, harvest, and taste at least 10 wild plants you've never eaten before. Spit out anything you're unsure of.",c:"ADVENTURE",xp:50,diff:"Medium"},
{t:"Do a long-distance open water swim",d:"At least 2km in open water — lake, sea, or large river. Train for it. Have a safety kayaker or boat. Complete the distance without touching land or boat.",c:"ADVENTURE",xp:90,diff:"Hard"},

// SKILLS ────────────────────────────────────────────────────────────
{t:"Learn to tornado kick",d:"The martial arts movie move. Watch a detailed YouTube tutorial. Practice the steps daily in a park or gym for at least a week: the setup step, the chamber, the rotation, the kick extension. Land one clean tornado kick that makes a satisfying whoosh sound. Film it.",c:"SKILLS",xp:80,diff:"Hard"},
{t:"Learn an elbow lever",d:"A calisthenics skill where you balance your body horizontally on one elbow tucked into your abdomen. Requires real core and shoulder strength. Drill it daily for 2 weeks. Hold the position for 3 clean seconds with feet off the ground.",c:"SKILLS",xp:80,diff:"Hard"},
{t:"Teach yourself to juggle 3 balls",d:"Get three juggling balls or make them from balloons and rice. Watch one tutorial — the basic cascade pattern. Practice 15 minutes daily. Land 20 consecutive catches without dropping. Then juggle in public.",c:"SKILLS",xp:50,diff:"Medium"},
{t:"Learn to do a backflip off a diving board",d:"Start with tuck jumps on the board. Progress to back dives, then back tucks with a spotter. Work with a coach or experienced friend. Land a clean backflip into water — full rotation, no belly flop.",c:"SKILLS",xp:90,diff:"Hard"},
{t:"Pick a lock",d:"Buy a beginner lock pick set and a clear practice lock. Learn the feel of each pin setting. Practice until you can pick a standard padlock in under 2 minutes. Understand the mechanics of why locks work.",c:"SKILLS",xp:60,diff:"Medium"},
{t:"Whittle a knife from a stick",d:"Find a hardwood stick — oak, maple, or beech. Using a sharp pocket knife, carve a pointed, handle-gripped shape. Get it sharp enough to cut string or paper. Sand it smooth if you want. Keep it.",c:"SKILLS",xp:50,diff:"Medium"},
{t:"Learn to weld",d:"Find a local maker space, community college, or friend with a welder. Take an intro class. Weld two pieces of steel together with a clean bead. Understand the difference between MIG, TIG, and stick.",c:"SKILLS",xp:70,diff:"Medium"},
{t:"Learn 20 words of a new language in one day",d:"Pick a language you know nothing about — Swahili, Finnish, Tagalog, whatever. Use flashcards, apps, or a notebook. Learn 20 real, usable words. Test yourself at the end of the day. Use one in conversation.",c:"SKILLS",xp:30,diff:"Easy"},
{t:"Learn to play one song on guitar",d:"Borrow or buy a cheap acoustic guitar. Learn one complete song — chords, strumming pattern, transitions. Play it all the way through without stopping. Record it, even if it's rough.",c:"SKILLS",xp:60,diff:"Medium"},
{t:"Learn to skateboard basics",d:"Get a skateboard — borrow or buy a cheap one. Learn to push, ride, turn, and stop confidently. Then learn an ollie. Practice daily in a car park for a week. Film your best ollie.",c:"SKILLS",xp:50,diff:"Medium"},
{t:"Learn calligraphy basics",d:"Get a dip pen with nibs or brush pens. Learn to write the entire alphabet in a classic style — copperplate, gothic, or italic. Write a quote beautifully enough to frame it.",c:"SKILLS",xp:40,diff:"Easy"},
{t:"Learn to free-dive underwater",d:"No tank — just breath-hold. Learn the breathing technique and equalisation. Practice in a pool first. Dive to at least 5 metres deep. Stay calm. Come up slowly.",c:"SKILLS",xp:70,diff:"Medium"},
{t:"Learn to ride a unicycle",d:"Borrow or buy one. Practice along a wall or fence for at least a week — 15 minutes daily. Eventually let go and pedal. Travel at least 20 metres unaided. Feel the weirdest balance of your life.",c:"SKILLS",xp:80,diff:"Hard"},
{t:"Learn to do a muscle-up",d:"The explosive pull-up that transitions to a dip above the bar. Work on high pull-ups, false grip, and the transition. Land one clean muscle-up — no kipping, full lockout at the top.",c:"SKILLS",xp:90,diff:"Hard"},
{t:"Learn to make a soufflé",d:"The most anxiety-inducing dish in cooking. Get the technique exactly right — the roux, the egg whites, the folding. Put it in the oven. Actually watch it rise without opening the door. Eat it in triumph before it falls.",c:"SKILLS",xp:50,diff:"Medium"},
{t:"Learn hand-to-hand combat basics",d:"Take a boxing, Muay Thai, Krav Maga, or BJJ class. Learn at least 3 functional techniques — a strike, a block, an escape — that you could actually use. Drill them until they're muscle memory.",c:"SKILLS",xp:60,diff:"Medium"},
{t:"Learn to solve a Rubik's cube",d:"Learn the beginner's layer-by-layer method. Practice the algorithms. Time yourself. Solve a fully scrambled cube from memory in under 5 minutes, then under 2. Feel the click of the last turn.",c:"SKILLS",xp:60,diff:"Medium"},
{t:"Learn to do a standing backflip",d:"On grass or gymnastics mats with a spotter. Work progressions: backward rolls, macacos, back handsprings. Build the courage to commit. Land a clean standing back tuck. The ground will still be there.",c:"SKILLS",xp:100,diff:"Hard"},
{t:"Learn to wire an electrical outlet",d:"With the power OFF. Watch tutorials. Understand line, neutral, and ground. Buy materials. Correctly wire a new outlet or replace an old one. Test it. Turn the power back on. It works.",c:"SKILLS",xp:50,diff:"Medium"},
{t:"Learn to repair a bicycle yourself",d:"Fix a flat tire — remove wheel, replace tube, reseat tire. Adjust the derailleur so it shifts cleanly. Align the brakes so they stop evenly. Do all three on your own bike without taking it to a shop.",c:"SKILLS",xp:40,diff:"Easy"},
{t:"Learn to make bread from scratch",d:"Flour, water, salt, yeast. No bread machine. Knead it by hand until smooth and elastic. Let it prove. Bake it in a real oven. Pull out a golden loaf. Eat it warm with butter. Smell your kitchen for hours.",c:"SKILLS",xp:30,diff:"Easy"},
{t:"Learn to handstand against a wall",d:"Kick up against a wall. Hold for 30 seconds with a straight body, pointed toes, tight core. Then try free-balancing — even just 5 seconds away from the wall counts as a win.",c:"SKILLS",xp:60,diff:"Medium"},
{t:"Learn to throw a boomerang",d:"Get a real returning boomerang — not a toy store one. Watch tutorials on the throw technique. Go to a large open field on a calm day. Throw it. Watch it curve. Actually catch it on its return.",c:"SKILLS",xp:40,diff:"Easy"},
{t:"Learn to tie 10 knots",d:"Bowline, cleat hitch, trucker's hitch, sheet bend, reef knot, figure-8, clove hitch, taut-line hitch, prusik, alpine butterfly. Learn all 10 from memory. Tie each one with your eyes closed.",c:"SKILLS",xp:50,diff:"Medium"},
{t:"Learn to make sushi rolls",d:"Source sashimi-grade fish from a reputable fishmonger. Make proper sushi rice — seasoned with rice vinegar, sugar, and salt. Roll maki and form nigiri. Present a plate that looks restaurant-quality. Eat it all.",c:"SKILLS",xp:50,diff:"Medium"},
{t:"Learn to touch type at 40+ WPM",d:"Use keybr.com, Monkeytype, or TypingClub. Learn proper finger placement on the home row. Practice 15 minutes daily for 2 weeks. Test at 40+ words per minute with 95%+ accuracy.",c:"SKILLS",xp:50,diff:"Medium"},
{t:"Learn to throw a knife",d:"Safely — into a wooden target, never at people or animals. Get throwing knives. Learn the one-rotation and half-rotation techniques. Stick 5 consecutive throws from at least 3 metres.",c:"SKILLS",xp:60,diff:"Medium"},
{t:"Learn to surf",d:"Take a lesson or borrow a foamie. Learn to pop up. Paddle out past the breakers. Ride at least 3 green (unbroken) waves all the way to shore standing on the board. Feel the glide.",c:"SKILLS",xp:80,diff:"Hard"},
{t:"Learn to do a kip-up",d:"From flat on your back — kip your legs up, snap your hips forward, and land standing. The move every action hero uses to get up. Practice on grass or mats until you nail it cleanly.",c:"SKILLS",xp:70,diff:"Medium"},
{t:"Learn origami — fold 5 complex models",d:"Not the simple stuff. Fold at least 5 advanced models: crane (properly), lotus, dragon, modular kusudama, and one of your choice. Use proper origami paper. Display them.",c:"SKILLS",xp:50,diff:"Medium"},
{t:"Learn to build a fire in rain",d:"Wet conditions, wet wood, actual rain falling. Find dry inner wood by splitting logs. Build a platform to keep the fire off wet ground. Use feather sticks and birch bark. Sustain a fire for 20+ minutes.",c:"SKILLS",xp:80,diff:"Hard"},
{t:"Learn to make candles from scratch",d:"Source wax (soy, beeswax, or paraffin), wicks, and moulds or containers. Melt, pour, and cool. Add essential oils if you want. Make at least 3 candles that burn cleanly for 2+ hours each.",c:"SKILLS",xp:30,diff:"Easy"},
{t:"Learn to paint a portrait",d:"Set up a canvas, acrylics or oils, and a patient friend. Paint their face. Capture something true about them — not just likeness, but character. Spend at least 4 hours on it.",c:"SKILLS",xp:60,diff:"Medium"},
{t:"Learn to throw a punch correctly",d:"Stance, guard, hip rotation, exhale on impact, keep the wrist straight. Get someone who knows how to fight to check your form. Hit a heavy bag with proper technique until it feels natural.",c:"SKILLS",xp:40,diff:"Easy"},
{t:"Learn to ride a motorbike",d:"Take a certified training course. Learn clutch, throttle, brake coordination. Ride a real motorbike on a real road — at least 20km. Feel the vulnerability and the freedom.",c:"SKILLS",xp:80,diff:"Hard"},
{t:"Learn to use a compass and map",d:"Buy a proper orienteering compass and a topographic map of your area. Learn to take a bearing, account for declination, and navigate from point A to point B using only map and compass.",c:"SKILLS",xp:60,diff:"Medium"},
{t:"Learn to sharpen a knife with a whetstone",d:"Get a whetstone — 1000/6000 grit combo. Learn to hold a consistent angle. Sharpen a dull knife until it can cleanly slice paper and shave arm hair. No pull-through sharpeners allowed.",c:"SKILLS",xp:40,diff:"Easy"},
{t:"Learn to whistle extremely loud",d:"Two fingers in mouth, or the thumb-and-index technique. Practice until you can produce a piercing whistle audible from 100 metres away. Annoy everyone you know.",c:"SKILLS",xp:20,diff:"Easy"},
{t:"Learn to speak in front of 20+ people",d:"Prepare a 5-minute talk on anything you know well. No reading from notes. Deliver it to a real audience of at least 20 people — at a meetup, class, or arranged gathering. Make eye contact. Finish strong.",c:"SKILLS",xp:70,diff:"Medium"},
{t:"Learn to do the splits",d:"Front splits or side splits. Stretch daily for at least 2 weeks — hamstrings, hip flexors, adductors. Use progressive stretches. Document the day your hips finally touch the floor.",c:"SKILLS",xp:60,diff:"Medium"},
{t:"Learn to make fire without matches",d:"Bow drill or hand drill method. Carve the set yourself: spindle, fireboard, bearing block. Produce an actual coal. Transfer it to tinder and blow it into flame. Primitive and deeply satisfying.",c:"SKILLS",xp:70,diff:"Medium"},
{t:"Learn to do a backflip on flat ground",d:"Progress from trampoline to mats to grass. Work with a spotter. Build the explosive jump and tight tuck. Land your first standing backflip on flat ground. Film it. Watch it 100 times.",c:"SKILLS",xp:100,diff:"Hard"},
{t:"Learn to cook 5 signature dishes",d:"Develop 5 dishes you can cook perfectly from memory — an appetiser, a soup, a main, a side, and a dessert. Cook all 5 for a dinner party. Receive genuine compliments.",c:"SKILLS",xp:70,diff:"Medium"},
{t:"Learn to do a human flag",d:"Grip a vertical pole. Press your body out horizontally. One of the hardest calisthenics holds. Work progressions for months. Hold it for at least 2 seconds.",c:"SKILLS",xp:100,diff:"Hard"},
{t:"Learn to read sheet music",d:"Treble and bass clef. Note values, rests, key signatures, time signatures. Be able to look at a simple piece of sheet music and play it on a piano or other instrument. Sight-read something new.",c:"SKILLS",xp:60,diff:"Medium"},
{t:"Learn to drive a manual car",d:"Find a friend with a stick shift or take a lesson. Learn clutch bite point, gear changes, hill starts. Drive 20km through varied traffic without stalling once.",c:"SKILLS",xp:60,diff:"Medium"},
{t:"Learn to do a one-arm push-up",d:"Work from regular push-ups through archer push-ups, one-arm negatives, and finally the full movement. Chest to floor, full lockout. Do 5 consecutive on each arm.",c:"SKILLS",xp:80,diff:"Hard"},
{t:"Learn to make cheese",d:"Start with a simple fresh cheese — ricotta, paneer, or mozzarella. Heat milk, add acid or rennet, strain, shape. Eat cheese you made yourself within an hour of starting.",c:"SKILLS",xp:40,diff:"Easy"},
{t:"Learn to do a front lever",d:"Hang from a bar and raise your body horizontally. Work through progressions: tucked, advanced tucked, straddle, full. Hold the full front lever for at least 3 seconds.",c:"SKILLS",xp:100,diff:"Hard"},
{t:"Learn to code a simple website from scratch",d:"HTML, CSS, and a touch of JavaScript. Build a personal site with at least 3 pages. No templates, no website builders. Write every line yourself.",c:"SKILLS",xp:60,diff:"Medium"},
{t:"Learn to do a butterfly kick",d:"The wushu/breakdance move. Learn the setup: step, dip, swing the back leg, push off, rotate horizontally. Land it clean. Feel like you're in a martial arts film.",c:"SKILLS",xp:80,diff:"Hard"},
{t:"Learn to mix 3 classic cocktails",d:"Old Fashioned, Martini, and Margarita — or your region's equivalents. Learn the proper techniques: stirring, shaking, muddling. Make all three for friends who know cocktails and get their approval.",c:"SKILLS",xp:40,diff:"Easy"},
{t:"Learn to change a car tyre",d:"On your own car or a friend's. Locate the jack points. Loosen lug nuts before lifting. Swap the tyre. Tighten in a star pattern. Do it in under 20 minutes.",c:"SKILLS",xp:30,diff:"Easy"},
{t:"Learn to do a planche",d:"The holy grail of calisthenics. Years of progression from planche lean through tuck, advanced tuck, straddle, to full. Even a straddle planche held for 2 seconds is a massive achievement.",c:"SKILLS",xp:100,diff:"Hard"},
{t:"Learn to sew a garment",d:"Get a sewing machine or needle and thread. Follow a pattern. Cut fabric, pin, sew seams, hem. Create a piece of clothing you can actually wear in public.",c:"SKILLS",xp:60,diff:"Medium"},
{t:"Learn to perform CPR",d:"Take a certified CPR course. Learn chest compressions, rescue breaths, AED use. Get your certification card. You now know how to save a life.",c:"SKILLS",xp:50,diff:"Medium"},
{t:"Learn to do a 360 on a snowboard or skis",d:"On snow or indoor slope. Work up from 180s. Commit to the full rotation. Land riding away clean. Feel the world blur.",c:"SKILLS",xp:70,diff:"Medium"},
{t:"Learn to play chess well",d:"Study basic openings, tactics puzzles, and endgame principles. Play 50 games with analysis. Reach a 1000+ rating on chess.com or Lichess. Beat someone who used to beat you.",c:"SKILLS",xp:70,diff:"Medium"},
{t:"Learn to make a proper espresso",d:"Get access to an espresso machine. Learn dosing, tamping, extraction time. Pull a shot with good crema that tastes balanced — not sour, not bitter. Make a flat white or latte with it.",c:"SKILLS",xp:40,diff:"Easy"},
{t:"Learn to do 100 push-ups in a row",d:"Train with a program like Grease the Groove or a progressive plan. Build from whatever you can do now. Hit 100 consecutive push-ups — chest touching floor each rep.",c:"SKILLS",xp:80,diff:"Hard"},
{t:"Learn to do a standing long jump of 2.5m",d:"Measure your current jump. Work on explosive power — plyometrics, squats, technique. Track weekly. Beat 2.5 metres (or your body-appropriate target).",c:"SKILLS",xp:50,diff:"Medium"},
{t:"Learn to write a proper essay",d:"Thesis, evidence, counterargument, conclusion. Write a 1500-word essay on something you care about. Edit it twice. Share it publicly or submit it somewhere.",c:"SKILLS",xp:50,diff:"Medium"},
{t:"Learn to do a back walkover",d:"Bridge first, then kick over from a bridge. Work on back flexibility and shoulder strength. Complete the full movement — standing to bridge to standing — smoothly.",c:"SKILLS",xp:70,diff:"Medium"},
{t:"Learn to brew beer or cider",d:"Get a homebrew kit. Follow a recipe. Sanitise everything. Ferment for weeks. Bottle. Wait. Open and drink something you made. Even if it's not great, you made alcohol from scratch.",c:"SKILLS",xp:60,diff:"Medium"},
{t:"Learn to navigate by the stars",d:"Find Polaris. Identify at least 5 constellations and use them to determine direction. On a clear night, navigate at least 1km using only celestial navigation.",c:"SKILLS",xp:60,diff:"Medium"},
{t:"Learn to do a pistol squat",d:"Single-leg squat, other leg extended forward. Work progressions: assisted, to a box, negatives. Perform 5 clean pistol squats on each leg with full depth.",c:"SKILLS",xp:60,diff:"Medium"},
{t:"Learn to draw a realistic eye",d:"Study the anatomy — iris, pupil, highlights, eyelids, lashes. Draw one eye in pencil with proper shading and reflection. Make it look alive.",c:"SKILLS",xp:40,diff:"Easy"},
{t:"Learn to do a headstand",d:"Tripod or forearm headstand. Build neck strength and balance. Hold for 30 seconds away from a wall with straight legs. Feel the blood rush.",c:"SKILLS",xp:40,diff:"Easy"},
{t:"Learn to do a kickflip on a skateboard",d:"Master the ollie first. Then learn the flick — front foot slides off the side. Land one kickflip rolling. The board flips under you. You land back on it. Magic.",c:"SKILLS",xp:90,diff:"Hard"},
{t:"Learn to cook the perfect steak",d:"Learn doneness temperatures. Master the sear — cast iron or grill, high heat, butter baste. Rest it properly. Cut it open to perfect medium-rare. Sauce optional.",c:"SKILLS",xp:40,diff:"Easy"},
{t:"Learn to do a pull-up if you can't do one",d:"Start with dead hangs, negatives, and banded pull-ups. Train consistently. The day you pull your chin over the bar unassisted is a genuine milestone.",c:"SKILLS",xp:50,diff:"Medium"},
{t:"Learn to make a short film",d:"Write a 2-page script. Shoot it on any camera — phone is fine. Edit it together with free software. A complete 3-minute story from idea to final export.",c:"SKILLS",xp:70,diff:"Medium"},
{t:"Learn to do a full split jerk",d:"Olympic weightlifting movement. Learn the dip, drive, and split. Put weight overhead. Have a coach check your form. Hit a bodyweight jerk.",c:"SKILLS",xp:80,diff:"Hard"},
{t:"Learn to make pottery on a wheel",d:"Find a pottery studio offering beginner classes. Centre the clay. Pull up the walls. Make a bowl or cup that's actually functional. Glaze and fire it. Use it.",c:"SKILLS",xp:60,diff:"Medium"},

// SOCIAL ────────────────────────────────────────────────────────────
{t:"Start a fight club with your friends",d:"Weekly sparring group. Get gloves, mouthguards, a safe space. Set clear rules: no face shots, tap to stop, respect always. Your first spar must go 2+ rounds. It's about growth, not violence.",c:"SOCIAL",xp:80,diff:"Hard"},
{t:"Host a dinner party for 8+ people",d:"Plan a full menu — appetiser, main, dessert. Cook every course yourself from scratch. Set the table properly. No takeout. Real dinner, real conversation, real clinking of glasses.",c:"SOCIAL",xp:60,diff:"Medium"},
{t:"Organise a scavenger hunt for strangers",d:"Design a multi-clue urban scavenger hunt with clever riddles and photo challenges. Recruit at least 10 participants via social media or word of mouth. Watch strangers become teammates.",c:"SOCIAL",xp:80,diff:"Hard"},
{t:"Strike up a conversation with an elderly stranger",d:"Sit next to someone 60+ at a park, café, or bus stop. Ask them: 'What's the best piece of advice you were ever given?' Listen for at least 30 minutes without checking your phone.",c:"SOCIAL",xp:30,diff:"Easy"},
{t:"Busk in public with any skill",d:"Play music, juggle, draw portraits, tell jokes, do magic — anything performable. Set up in a public spot with a hat or case for tips. Stay out there for at least 1 hour, regardless of the crowd.",c:"SOCIAL",xp:60,diff:"Medium"},
{t:"Throw an impromptu block party",d:"With 24 hours' notice, knock on 10+ neighbours' doors and invite them to a backyard or street gathering. Minimum 15 people show up. Provide music and some food. See what community feels like.",c:"SOCIAL",xp:80,diff:"Hard"},
{t:"Go on a blind date",d:"Ask a mutual friend to set you up with someone they genuinely think you'd like. No pre-Googling, no Instagram stalking. Show up. Full conversation, at least 2 hours. See what happens.",c:"SOCIAL",xp:50,diff:"Medium"},
{t:"Spend a day only speaking in rhymes",d:"From the moment you wake up, every sentence you speak must rhyme. Commit fully. Talk to strangers, order coffee, answer phone calls — all in rhyme. See who plays along.",c:"SOCIAL",xp:30,diff:"Easy"},
{t:"Crash a wedding reception",d:"Charming plus-one energy only. Dress appropriately. Blend in. Dance with someone from the wedding party. Congratulate the couple sincerely. Eat cake. Leave before you're asked to.",c:"SOCIAL",xp:90,diff:"Hard"},
{t:"Get 10 strangers to take a group photo together",d:"In a public place, approach 10 complete strangers and convince them to pose in a coordinated group photo with you. Give them a reason. Send everyone the photo.",c:"SOCIAL",xp:50,diff:"Medium"},
{t:"Handwrite and deliver a letter to a friend",d:"Not email. Not text. Pen and paper in an envelope. Write something genuine and personal. Deliver it by hand or post. The physical letter is a dying art — revive it.",c:"SOCIAL",xp:20,diff:"Easy"},
{t:"Challenge someone to an arm wrestle",d:"A stranger at a bar, a friend at a party, anyone. Set it up properly — elbows down, grip locked, crowd watching. Win or lose, buy them a drink after.",c:"SOCIAL",xp:30,diff:"Easy"},
{t:"Ask a stranger on a spontaneous adventure",d:"Walk up to someone who looks interesting. Say: 'I'm trying to do something spontaneous right now — want to come?' Propose something specific. At least one person says yes.",c:"SOCIAL",xp:60,diff:"Medium"},
{t:"Organise a midnight activity",d:"Midnight bowling, midnight picnic, midnight hike, midnight swim. Get 8+ people out doing something between midnight and 3am that's usually done in daylight. Make it weird and memorable.",c:"SOCIAL",xp:50,diff:"Medium"},
{t:"Do an improv comedy class",d:"Sign up for an intro improv session. Learn 'yes, and.' Perform scenes in front of the class. Fail gloriously. Laugh genuinely. Discover that being unfunny on purpose is liberating.",c:"SOCIAL",xp:50,diff:"Medium"},
{t:"Hitchhike a short distance",d:"Stick your thumb out on a safe road. Get a lift of at least 10km. Have a real conversation with the driver — ask about their life, their road stories. Thank them sincerely.",c:"SOCIAL",xp:70,diff:"Medium"},
{t:"Throw a rooftop party",d:"Organise access to any accessible rooftop. 15+ people, music, good lighting, better vibes. Make it feel exclusive and free. Clean up thoroughly afterward.",c:"SOCIAL",xp:70,diff:"Medium"},
{t:"Befriend someone 20+ years older than you",d:"Not online. In real life. Someone from a different generation — at work, in your neighbourhood, at a hobby group. Build genuine friendship. Learn what they know that you don't.",c:"SOCIAL",xp:60,diff:"Medium"},
{t:"Do karaoke badly on purpose",d:"Pick a song you barely know. Go hard. Be the worst singer in the room and own it completely. The goal is not to sound good — it's to be fearless. Bring the energy.",c:"SOCIAL",xp:30,diff:"Easy"},
{t:"Start a book club and run 3 meetings",d:"Recruit at least 4 people. Pick 3 books together — each person nominates one. Host 3 real meetings with actual discussion. Serve snacks. Keep it going.",c:"SOCIAL",xp:60,diff:"Medium"},
{t:"Join a club you know nothing about",d:"Chess club, fencing, amateur radio, birdwatching, roller derby — something you've never considered. Attend at least 3 sessions. Be the newcomer. Learn the culture.",c:"SOCIAL",xp:50,diff:"Medium"},
{t:"Give someone a genuine compliment every day for a week",d:"Not hollow flattery. Something specific, true, and unexpected. Notice the reaction. Watch what consistent, honest kindness does to the people around you.",c:"SOCIAL",xp:20,diff:"Easy"},
{t:"Plan a 48-hour trip for your group",d:"Organise everything — transport, accommodation, activities, meals — for 4+ friends. No one else plans anything. Handle all the logistics. Make it smooth enough that no one complains.",c:"SOCIAL",xp:70,diff:"Medium"},
{t:"Cold-approach and make a genuine friend",d:"Walk up to someone you find interesting — at a bar, park, event, anywhere. Start a real conversation. Don't pitch anything. Leave with their contact info and a plan to meet again.",c:"SOCIAL",xp:50,diff:"Medium"},
{t:"Teach something to a kid",d:"A skill you have — juggling, a card trick, how to draw, a science concept. Give a child 30 minutes of genuine teaching. Watch their eyes when they get it.",c:"SOCIAL",xp:30,diff:"Easy"},
{t:"Do a 24-hour communication blackout",d:"No phone, no internet, no messaging. Navigate an entire day using only face-to-face conversation, handwritten notes, and actual human presence. See what you notice.",c:"SOCIAL",xp:50,diff:"Medium"},
{t:"Throw a themed costume house party",d:"Not a generic holiday theme. Something creative and specific — 'Characters from paintings,' 'Time travellers,' 'Things that shouldn't be alive.' All guests must dress up. At least 20 people. Award prizes.",c:"SOCIAL",xp:60,diff:"Medium"},
{t:"Organise a weekly game that lasts 3 months",d:"Poker, D&D, board game night, trivia league. Same night every week for 12+ weeks. Build a community around it. See who sticks.",c:"SOCIAL",xp:80,diff:"Hard"},
{t:"Go to a concert alone and make two friends",d:"Buy a single ticket. Go by yourself. Start conversations with people near you. Leave with contact info from two people you genuinely clicked with.",c:"SOCIAL",xp:50,diff:"Medium"},
{t:"Learn the name of every person on your street",d:"Knock on doors or stop people walking by. Introduce yourself. Learn at least 10 neighbours' names and one fact about each. Build actual community.",c:"SOCIAL",xp:40,diff:"Easy"},
{t:"Pull off a surprise for someone",d:"Plan and execute a genuine surprise — birthday, celebration, or just-because — that requires coordination, secrecy, and at least 3 other people. Make them emotional.",c:"SOCIAL",xp:60,diff:"Medium"},
{t:"Write and deliver a toast",d:"At a dinner, party, wedding, or gathering. Write a proper toast — sincere, brief, and memorable. Stand up and deliver it without reading from paper. Clink glasses.",c:"SOCIAL",xp:50,diff:"Medium"},
{t:"Host an outdoor film screening",d:"Projector, sheet or wall, night sky, 10+ people. Pick a film that suits the setting. Provide blankets and popcorn. Everyone stays through the credits.",c:"SOCIAL",xp:50,diff:"Medium"},
{t:"Get someone to try something they swore they'd never do",d:"Identify a friend's hard no — a food, an activity, an experience. Gently, creatively, respectfully get them to try it. Make sure they actually enjoy the experience.",c:"SOCIAL",xp:60,diff:"Medium"},
{t:"Spend a day using only cash",d:"No cards, no digital payments, no phone wallets. Withdraw physical money in the morning. Navigate a full day buying everything with paper and coins. Feel how money used to feel.",c:"SOCIAL",xp:20,diff:"Easy"},
{t:"Organise a community cleanup",d:"Pick a neglected public space — a park, beach, street, or trail. Gather at least 10 volunteers. Spend a morning cleaning it up. Take before and after photos.",c:"SOCIAL",xp:60,diff:"Medium"},
{t:"Perform at an open mic night",d:"Music, poetry, comedy, storytelling — whatever your thing is. Sign up. Get on stage. Perform for at least 3 minutes in front of strangers. Feel the terror and do it anyway.",c:"SOCIAL",xp:70,diff:"Medium"},
{t:"Create and hide 10 positive notes around your city",d:"Write 10 uplifting messages on paper. Hide them in library books, on bus seats, in café tip jars, under park benches. Make 10 strangers smile without ever knowing it was you.",c:"SOCIAL",xp:20,diff:"Easy"},
{t:"Go speed dating",d:"Find a speed dating event. Sit through the rapid-fire conversations. Be honest, be curious, be yourself. Even if you meet no one, you'll have 20+ micro-conversations to reflect on.",c:"SOCIAL",xp:40,diff:"Easy"},
{t:"Start a conversation in a language you're learning",d:"Find a native speaker — at a restaurant, shop, or language exchange. Attempt a real conversation in their language. Make mistakes. Keep going. Make yourself understood.",c:"SOCIAL",xp:50,diff:"Medium"},
{t:"Reconnect with a childhood friend",d:"The person you haven't spoken to in 5+ years. Find them. Call or message. Have a real catch-up. Reminisce. See who they've become and who you've become.",c:"SOCIAL",xp:40,diff:"Easy"},
{t:"Organise a sunrise gathering",d:"Pick a spot with a good eastern view. Invite 10+ people to meet at dawn. Bring coffee and blankets. Watch the sun rise together in relative silence. Start the day differently.",c:"SOCIAL",xp:40,diff:"Easy"},
{t:"Give a genuine apology to someone you wronged",d:"No excuses, no 'but.' Own what you did. Say you're sorry. Mean it. Don't expect forgiveness. Do it because it's right.",c:"SOCIAL",xp:50,diff:"Medium"},
{t:"Host a 'come as your younger self' party",d:"Guests dress as their teenage or childhood selves. Play music from that era. Look at old photos. Talk about who you were and who you became.",c:"SOCIAL",xp:50,diff:"Medium"},
{t:"Do a trust fall with a stranger",d:"At a team-building event, workshop, or just a willing stranger. Explain what you're doing. Fall backward. Let them catch you. Feel the weirdness of trusting someone you don't know.",c:"SOCIAL",xp:30,diff:"Easy"},
{t:"Organise a debate night",d:"Pick fun, low-stakes topics — 'Is a hot dog a sandwich?' 'Best decade for music?' Teams argue both sides. Formal format. Judge declares a winner. Prizes for best arguments.",c:"SOCIAL",xp:50,diff:"Medium"},
{t:"Go a full week without gossiping",d:"No talking about people who aren't present unless it's genuinely positive. Catch yourself before you start. See how it changes your relationships and your mind.",c:"SOCIAL",xp:50,diff:"Medium"},
{t:"Start a compliment chain in public",d:"Give a genuine compliment to a stranger. Ask them to pay it forward and compliment someone else. See how far the chain goes.",c:"SOCIAL",xp:20,diff:"Easy"},

// URBAN ────────────────────────────────────────────────────────────
{t:"Eat at a restaurant you'd normally walk past",d:"The place with no Instagram presence and plastic chairs. The one that's been there for 30 years. Go in. Order without looking at prices. Eat everything. Talk to the owner.",c:"URBAN",xp:30,diff:"Easy"},
{t:"Find the oldest building in your city",d:"Research what structure has stood the longest. Go there. Touch the walls if you can. Find and record at least one story about what happened inside it.",c:"URBAN",xp:40,diff:"Easy"},
{t:"Ride every line of your city's transit in one day",d:"Subway, light rail, tram — every line, end to end. No exits except to transfer. Document the journey. Time yourself. Talk to at least one person on each line.",c:"URBAN",xp:70,diff:"Medium"},
{t:"Paint something on a legal graffiti wall",d:"Find a designated street art zone or legal graffiti wall. Design and paint something that takes 2+ hours. Sign it with your tag. Leave it for others to see.",c:"URBAN",xp:60,diff:"Medium"},
{t:"Find a secret spot in your city",d:"A hidden courtyard, a rooftop garden, an unmarked speakeasy, a basement jazz bar. Somewhere that takes research to find. Get there. Tell almost no one where it is.",c:"URBAN",xp:50,diff:"Medium"},
{t:"Go dumpster diving",d:"Behind a bakery at closing time. A grocery store's produce bin. A furniture shop's discards. Find something genuinely useful or edible. Clean it. Use it. Don't be squeamish.",c:"URBAN",xp:40,diff:"Easy"},
{t:"Spend a night in a hotel in your own city",d:"Book a room. Be a tourist. Use the pool, order room service, go to the rooftop bar. Walk around your own city like you've never been there. See it fresh.",c:"URBAN",xp:50,diff:"Medium"},
{t:"Find and visit every bookshop in your city",d:"Map every new and used bookshop. Visit each one. Buy at least one book from an independent shop. Talk to a bookseller about what they recommend.",c:"URBAN",xp:50,diff:"Medium"},
{t:"Eat street food from 5 different vendors in one day",d:"All from street stalls, carts, or markets. Five different dishes or cuisines. All eaten standing up or on a curb. Rate each one out of 10.",c:"URBAN",xp:30,diff:"Easy"},
{t:"Take a completely random bus somewhere",d:"Board a bus you've never taken. Ride to the end of the line. Get off. Explore whatever neighbourhood you land in for at least 2 hours. Find something interesting.",c:"URBAN",xp:40,diff:"Easy"},
{t:"Find the worst-rated restaurant and eat there",d:"Google Maps, sort by lowest rating. Go in with an open mind. Order a full meal. Try genuinely to find something good about it. Write an honest, fair review.",c:"URBAN",xp:30,diff:"Easy"},
{t:"Walk every street in your neighbourhood",d:"Pull up a map. Trace a route that covers every single street and alley in your neighbourhood. Walk it over a weekend or several evenings. See everything you've been missing.",c:"URBAN",xp:60,diff:"Medium"},
{t:"Find a jazz bar and stay until closing",d:"A real jazz bar with live musicians. Order one drink. Sit close to the stage. Stay from the first set until they turn the lights on. Tip the band.",c:"URBAN",xp:40,diff:"Easy"},
{t:"Visit a market you've never been to",d:"Flea market, fish market, flower market, night market, farmers market. Whatever's nearest that you've always meant to check out. Go early. Talk to a vendor. Buy something small.",c:"URBAN",xp:20,diff:"Easy"},
{t:"Find and photograph every mural in your city",d:"Research online, then walk or bike to each one. Photograph every significant street mural. Document the artist and title if possible. Build a personal mural map.",c:"URBAN",xp:60,diff:"Medium"},
{t:"Get a haircut somewhere completely different",d:"A barber or salon in a neighbourhood you never visit. Don't bring a reference photo. Let them do what they think suits your face. Accept the result.",c:"URBAN",xp:30,diff:"Easy"},
{t:"Attend a live sports event",d:"In person. Not a major league game — find a local match, a minor league team, a school rivalry, a boxing card. Buy a ticket. Be loud. Care about the outcome.",c:"URBAN",xp:30,diff:"Easy"},
{t:"Explore an area of your city you've always avoided",d:"The 'rough' part of town, the boring suburb, the industrial estate. Walk it with genuine curiosity for 2+ hours. Find something that surprises you about it.",c:"URBAN",xp:40,diff:"Easy"},
{t:"Eat alone at a nice restaurant",d:"Book a table for one at a proper restaurant. Dress well. No phone at the table. Order multiple courses. Enjoy your own company fully. Tip well.",c:"URBAN",xp:40,diff:"Easy"},
{t:"Find an open-air cinema screening",d:"Rooftop, park, or beach cinema. Watch a film under the stars with a crowd of strangers. Bring a blanket. Stay for the credits. Feel the collective gasp at the big moment.",c:"URBAN",xp:30,diff:"Easy"},
{t:"Order something completely random off a menu",d:"Close your eyes, point, and order whatever your finger lands on. No substitutions. No sending it back. Eat the whole thing.",c:"URBAN",xp:20,diff:"Easy"},
{t:"Discover your city's most interesting hidden history",d:"Research something that happened in your city that isn't on any tourist sign — a forgotten disaster, a secret society, an unsolved mystery. Find a physical location connected to it.",c:"URBAN",xp:40,diff:"Easy"},
{t:"Find the best view in your city",d:"Not the tourist viewpoint. Ask locals, explore rooftops (legal ones), climb parking garages. Find the actual best view. Go there at golden hour.",c:"URBAN",xp:50,diff:"Medium"},
{t:"Spend a whole day in a museum",d:"Not a rushed visit. Open to close. Read every panel in at least 3 exhibits. Sketch something. Talk to a guard about what they've seen. Leave exhausted and full.",c:"URBAN",xp:40,diff:"Easy"},
{t:"Find a speakeasy bar",d:"The kind with no sign, a hidden door, and a password or reservation requirement. Do the research. Find it. Get in. Order something classic.",c:"URBAN",xp:50,diff:"Medium"},
{t:"Visit a pawn shop and buy something",d:"Go in with no plan. Browse for 20 minutes. Find something genuinely interesting or weird for under $20. Buy it. Learn its history or invent one.",c:"URBAN",xp:20,diff:"Easy"},
{t:"Find and ride a vintage carousel",d:"An actual antique carousel — hand-carved horses, original organ music. Ride it at least three times. Pick a different animal each time.",c:"URBAN",xp:20,diff:"Easy"},
{t:"Go to a record store and buy based on cover art only",d:"No listening stations. No Googling. Pick one album based solely on the cover. Take it home. Play it all the way through. Judge the book by its cover.",c:"URBAN",xp:30,diff:"Easy"},
{t:"Find the city's biggest tree",d:"Research it — councils often list significant trees. Find it. Stand next to it. Photograph something for scale. Touch the bark. Estimate its age.",c:"URBAN",xp:20,diff:"Easy"},
