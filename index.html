<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIDEQUEST</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne+Mono&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sage: #8FAE8B;
    --sage-light: #B5CCB0;
    --sage-pale: #D4E4D0;
    --sage-xpale: #EBF2E8;
    --beige: #E8DFC8;
    --beige-dark: #C9BA9B;
    --beige-xdark: #A89878;
    --cream: #F5F0E8;
    --black: #1A1A18;
    --black2: #2C2C28;
    --gray: #6B6B65;
    --gray-light: #9B9B92;
    --white: #FAFAF7;
    --danger: #C44B2B;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:var(--cream); color:var(--black); font-family:'Space Grotesk', sans-serif; overflow:hidden; }

  /* NAV */
  #app { display:flex; flex-direction:column; height:100vh; max-width:480px; margin:0 auto; background:var(--white); position:relative; box-shadow:0 0 60px rgba(0,0,0,0.08); }
  #topbar { padding:16px 20px 12px; border-bottom:1px solid var(--beige); display:flex; align-items:center; justify-content:space-between; background:var(--white); flex-shrink:0; }
  #topbar .logo { font-family:'Syne', sans-serif; font-weight:800; font-size:18px; letter-spacing:0.08em; color:var(--black); }
  #topbar .logo span { color:var(--sage); }
  #xp-bar-wrap { height:3px; background:var(--beige); flex-shrink:0; }
  #xp-bar { height:100%; background:var(--sage); transition:width 0.6s cubic-bezier(.4,0,.2,1); }
  #level-badge { font-family:'Syne Mono', monospace; font-size:11px; background:var(--sage); color:var(--white); padding:3px 8px; border-radius:20px; }

  /* TABS */
  #tabs { display:flex; border-bottom:1px solid var(--beige); background:var(--white); flex-shrink:0; overflow-x:auto; scrollbar-width:none; }
  #tabs::-webkit-scrollbar { display:none; }
  .tab-btn { flex:0 0 auto; padding:10px 14px; font-family:'Space Grotesk',sans-serif; font-size:12px; font-weight:500; letter-spacing:0.05em; color:var(--gray); background:none; border:none; cursor:pointer; position:relative; text-transform:uppercase; white-space:nowrap; transition:color .2s; }
  .tab-btn.active { color:var(--black); }
  .tab-btn.active::after { content:''; position:absolute; bottom:0; left:8px; right:8px; height:2px; background:var(--sage); border-radius:2px 2px 0 0; }
  .tab-btn:hover { color:var(--black2); }

  /* SCREENS */
  #screens { flex:1; overflow:hidden; position:relative; }
  .screen { position:absolute; inset:0; overflow-y:auto; padding:20px; opacity:0; pointer-events:none; transform:translateY(8px); transition:opacity .25s ease, transform .25s ease; scrollbar-width:thin; scrollbar-color:var(--beige) transparent; }
  .screen.active { opacity:1; pointer-events:all; transform:translateY(0); }

  /* QUEST CARDS */
  .quest-card { background:var(--white); border:1px solid var(--beige); border-radius:12px; padding:16px; margin-bottom:12px; cursor:pointer; transition:all .2s; position:relative; overflow:hidden; }
  .quest-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--sage); border-radius:3px 0 0 3px; opacity:0; transition:opacity .2s; }
  .quest-card:hover { border-color:var(--sage-light); transform:translateY(-1px); box-shadow:0 4px 16px rgba(143,174,139,0.12); }
  .quest-card:hover::before { opacity:1; }
  .quest-card.completed { background:var(--sage-xpale); border-color:var(--sage-pale); }
  .quest-card.completed::before { opacity:1; background:var(--sage); }
  .quest-meta { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .cat-tag { font-size:10px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; padding:3px 8px; border-radius:20px; }
  .cat-ADVENTURE { background:#DCEEFF; color:#1A5C9A; }
  .cat-SKILLS { background:#E8F5E2; color:#2D6B27; }
  .cat-SOCIAL { background:#FFF0DC; color:#8A5A1A; }
  .cat-URBAN { background:#EEE8FF; color:#5A2D8A; }
  .cat-MIND { background:#FFE8F0; color:#8A1A4A; }
  .cat-CHAOS { background:#FFE8E0; color:#8A2D1A; }
  .xp-tag { font-family:'Syne Mono', monospace; font-size:11px; color:var(--gray); margin-left:auto; }
  .xp-tag.high { color:var(--danger); font-weight:600; }
  .quest-title { font-size:15px; font-weight:500; line-height:1.4; color:var(--black); }
  .quest-desc { font-size:13px; color:var(--gray); margin-top:6px; line-height:1.5; }
  .quest-actions { display:flex; gap:8px; margin-top:12px; }
  .btn-sm { font-family:'Space Grotesk',sans-serif; font-size:12px; font-weight:500; padding:7px 14px; border-radius:8px; border:1px solid var(--beige); background:none; cursor:pointer; transition:all .15s; color:var(--black); }
  .btn-sm:hover { background:var(--beige); }
  .btn-sm.primary { background:var(--sage); border-color:var(--sage); color:var(--white); }
  .btn-sm.primary:hover { background:var(--sage-light); }
  .btn-sm.done { background:var(--beige); color:var(--gray); }

  /* FILTER ROW */
  .filter-row { display:flex; gap:8px; margin-bottom:16px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
  .filter-row::-webkit-scrollbar { display:none; }
  .filter-pill { flex:0 0 auto; font-size:11px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; padding:5px 12px; border-radius:20px; border:1px solid var(--beige); background:none; cursor:pointer; color:var(--gray); transition:all .15s; }
  .filter-pill.active { background:var(--black); color:var(--white); border-color:var(--black); }
  .filter-pill:hover:not(.active) { border-color:var(--beige-dark); color:var(--black); }

  /* MODAL */
  #modal-overlay { position:absolute; inset:0; background:rgba(26,26,24,0.6); z-index:100; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity .25s; backdrop-filter:blur(2px); }
  #modal-overlay.open { opacity:1; pointer-events:all; }
  #modal { background:var(--white); border-radius:20px 20px 0 0; padding:24px 20px; width:100%; max-height:85vh; overflow-y:auto; transform:translateY(20px); transition:transform .3s cubic-bezier(.4,0,.2,1); }
  #modal-overlay.open #modal { transform:translateY(0); }
  .modal-handle { width:36px; height:3px; background:var(--beige-dark); border-radius:2px; margin:0 auto 20px; }
  .modal-cat { font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:8px; }
  .modal-title { font-family:'Syne', sans-serif; font-size:20px; font-weight:700; line-height:1.3; margin-bottom:12px; }
  .modal-desc { font-size:14px; color:var(--gray); line-height:1.6; margin-bottom:16px; }
  .modal-xp-row { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
  .xp-big { font-family:'Syne Mono', monospace; font-size:22px; color:var(--sage); font-weight:600; }
  .diff-label { font-size:12px; color:var(--gray); }
  .modal-actions { display:flex; flex-direction:column; gap:10px; }
  .btn-full { width:100%; font-family:'Space Grotesk',sans-serif; font-size:14px; font-weight:600; padding:14px; border-radius:12px; border:1px solid var(--beige); background:none; cursor:pointer; transition:all .2s; color:var(--black); }
  .btn-full.primary { background:var(--sage); border-color:var(--sage); color:var(--white); }
  .btn-full.primary:hover { background:var(--sage-light); }
  .btn-full:hover:not(.primary) { background:var(--beige); }

  /* MEMORY SECTION (journal style) */
  .memory-section { margin-top:20px; border-top:1px solid var(--beige); padding-top:16px; }
  .memory-label { font-size:12px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--gray); margin-bottom:10px; }
  .journal-grid { column-count:2; column-gap:10px; margin-bottom:10px; }
  .journal-card {
    background:var(--cream);
    border:1px solid var(--beige);
    border-radius:12px;
    padding:10px;
    margin-bottom:10px;
    break-inside:avoid;
    transform:rotate(var(--rot, 0deg));
    transition:transform .2s;
    box-shadow:2px 2px 6px rgba(0,0,0,0.04);
  }
  .journal-card:hover { transform:rotate(0deg) scale(1.01); }
  .journal-card img, .journal-card video {
    width:100%;
    border-radius:8px;
    margin-bottom:8px;
    object-fit:cover;
  }
  .journal-note {
    font-size:13px;
    color:var(--black);
    line-height:1.5;
    white-space:pre-wrap;
    margin-bottom:6px;
  }
  .journal-date {
    font-family:'Syne Mono', monospace;
    font-size:10px;
    color:var(--gray-light);
    text-align:right;
  }
  .memory-upload-btn { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--sage); background:none; border:1px dashed var(--sage-light); border-radius:8px; padding:10px 14px; cursor:pointer; width:100%; justify-content:center; margin-top:10px; }
  .memory-upload-btn:hover { background:var(--sage-xpale); }

  /* BADGES */
  .badge-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:8px; }
  .badge-card {
    background:var(--cream);
    border:1px solid var(--beige);
    border-radius:14px;
    padding:14px;
    text-align:center;
    opacity:0.5;
    transition:all .2s;
  }
  .badge-card.earned { opacity:1; border-color:var(--sage); background:var(--sage-xpale); }
  .badge-icon { font-size:28px; margin-bottom:6px; color:var(--sage); }
  .badge-name { font-size:12px; font-weight:600; color:var(--black); }
  .badge-desc { font-size:10px; color:var(--gray); margin-top:2px; }

  /* LEVELS SCREEN */
  .level-hero { text-align:center; padding:24px 0 20px; }
  .level-number { font-family:'Syne', sans-serif; font-size:64px; font-weight:800; color:var(--sage); line-height:1; }
  .level-title-text { font-family:'Syne', sans-serif; font-size:16px; font-weight:600; color:var(--black); margin-top:4px; }
  .xp-progress-wrap { background:var(--beige); border-radius:8px; height:8px; margin:16px 0 8px; overflow:hidden; }
  .xp-progress-bar { height:100%; background:var(--sage); border-radius:8px; transition:width .8s cubic-bezier(.4,0,.2,1); }
  .xp-label { font-family:'Syne Mono', monospace; font-size:12px; color:var(--gray); text-align:center; }
  .stats-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:20px 0; }
  .stat-box { background:var(--cream); border:1px solid var(--beige); border-radius:12px; padding:14px; text-align:center; }
  .stat-num { font-family:'Syne Mono', monospace; font-size:24px; font-weight:700; color:var(--black); }
  .stat-lbl { font-size:11px; color:var(--gray); text-transform:uppercase; letter-spacing:0.06em; margin-top:2px; }
  .level-list { }
  .level-row { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--beige); }
  .level-row:last-child { border-bottom:none; }
  .lv-circle { width:36px; height:36px; border-radius:50%; border:2px solid var(--beige-dark); display:flex; align-items:center; justify-content:center; font-family:'Syne Mono', monospace; font-size:13px; font-weight:700; color:var(--gray); flex-shrink:0; }
  .lv-circle.reached { border-color:var(--sage); background:var(--sage); color:var(--white); }
  .lv-circle.current { border-color:var(--sage); color:var(--sage); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(143,174,139,0.4)} 50%{box-shadow:0 0 0 6px rgba(143,174,139,0)} }
  .lv-info { flex:1; }
  .lv-name { font-size:14px; font-weight:500; }
  .lv-xp { font-family:'Syne Mono', monospace; font-size:12px; color:var(--gray); }

  /* STATS SCREEN */
  .chart-wrap { background:var(--cream); border:1px solid var(--beige); border-radius:14px; padding:18px; margin-bottom:16px; }
  .chart-title { font-size:12px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--gray); margin-bottom:14px; }
  .bar-chart { display:flex; flex-direction:column; gap:10px; }
  .bar-row { display:flex; align-items:center; gap:10px; }
  .bar-label { font-size:12px; font-weight:500; width:80px; flex-shrink:0; color:var(--black); }
  .bar-track { flex:1; height:10px; background:var(--beige); border-radius:10px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:10px; transition:width 1s cubic-bezier(.4,0,.2,1); }
  .bar-count { font-family:'Syne Mono', monospace; font-size:12px; color:var(--gray); width:28px; text-align:right; flex-shrink:0; }
  .section-h { font-family:'Syne', sans-serif; font-size:14px; font-weight:700; letter-spacing:0.04em; margin-bottom:12px; color:var(--black); }
  .recent-list { }
  .recent-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px dashed var(--beige); }
  .recent-item:last-child { border-bottom:none; }
  .recent-dot { width:8px; height:8px; border-radius:50%; background:var(--sage); flex-shrink:0; }
  .recent-name { font-size:13px; flex:1; color:var(--black); }
  .recent-xp { font-family:'Syne Mono', monospace; font-size:12px; color:var(--sage); }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:48px 20px; color:var(--gray); }
  .empty-state .big-icon { font-size:48px; margin-bottom:12px; opacity:0.4; }
  .empty-state p { font-size:14px; line-height:1.6; }

  /* TOAST */
  #toast { position:absolute; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--black); color:var(--white); font-size:13px; font-weight:500; padding:10px 18px; border-radius:20px; opacity:0; pointer-events:none; transition:all .3s; white-space:nowrap; z-index:200; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* SCROLLBAR */
  .screen::-webkit-scrollbar { width:3px; }
  .screen::-webkit-scrollbar-thumb { background:var(--beige-dark); border-radius:2px; }

  /* SECTION HEADER */
  .sec-header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:14px; }
  .sec-header h2 { font-family:'Syne', sans-serif; font-size:17px; font-weight:700; }
  .sec-header .count { font-family:'Syne Mono', monospace; font-size:12px; color:var(--gray); }

  /* QUEST SHUFFLE BTN */
  .shuffle-btn { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:var(--sage); background:var(--sage-xpale); border:none; border-radius:20px; padding:7px 14px; cursor:pointer; letter-spacing:0.04em; transition:all .15s; margin-bottom:14px; }
  .shuffle-btn:hover { background:var(--sage-pale); }
  .shuffle-btn svg { transition:transform .4s; }
  .shuffle-btn:hover svg { transform:rotate(180deg); }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="logo">SIDE<span>QUEST</span></div>
    <div id="level-badge">LVL 1</div>
  </div>
  <div id="xp-bar-wrap"><div id="xp-bar" style="width:0%"></div></div>

  <div id="tabs">
    <button class="tab-btn active" onclick="showTab('quests')">Quests</button>
    <button class="tab-btn" onclick="showTab('active')">Active</button>
    <button class="tab-btn" onclick="showTab('completed')">Completed</button>
    <button class="tab-btn" onclick="showTab('stats')">Stats</button>
    <button class="tab-btn" onclick="showTab('levels')">Levels</button>
    <button class="tab-btn" onclick="showTab('badges')">Badges</button>
    <button class="tab-btn" onclick="showTab('journal')">Journal</button>
  </div>

  <div id="screens">

    <!-- QUESTS TAB -->
    <div class="screen active" id="screen-quests">
      <div class="sec-header">
        <h2>Today's Quests</h2>
        <span class="count" id="quest-count">0 quests</span>
      </div>
      <div class="filter-row" id="filter-row">
        <button class="filter-pill active" onclick="filterCat('ALL')">All</button>
        <button class="filter-pill" onclick="filterCat('ADVENTURE')">Adventure</button>
        <button class="filter-pill" onclick="filterCat('SKILLS')">Skills</button>
        <button class="filter-pill" onclick="filterCat('SOCIAL')">Social</button>
        <button class="filter-pill" onclick="filterCat('URBAN')">Urban</button>
        <button class="filter-pill" onclick="filterCat('MIND')">Mind</button>
        <button class="filter-pill" onclick="filterCat('CHAOS')">Chaos</button>
      </div>
      <button class="shuffle-btn" onclick="shuffleQuests()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6"/></svg>
        Shuffle
      </button>
      <div id="quest-list"></div>
    </div>

    <!-- ACTIVE TAB -->
    <div class="screen" id="screen-active">
      <div class="sec-header"><h2>Active Quests</h2><span class="count" id="active-count">0</span></div>
      <div id="active-list"></div>
    </div>

    <!-- COMPLETED TAB -->
    <div class="screen" id="screen-completed">
      <div class="sec-header"><h2>Completed</h2><span class="count" id="completed-count">0</span></div>
      <div id="completed-list"></div>
    </div>

    <!-- STATS TAB -->
    <div class="screen" id="screen-stats">
      <div class="chart-wrap">
        <div class="chart-title">Quests by category</div>
        <div class="bar-chart" id="cat-bar-chart"></div>
      </div>
      <div class="chart-wrap">
        <div class="chart-title">XP earned over time</div>
        <canvas id="xp-chart" height="120" style="width:100%"></canvas>
      </div>
      <div class="section-h">Recently Completed</div>
      <div id="recent-completed" class="recent-list"></div>
    </div>

    <!-- LEVELS TAB -->
    <div class="screen" id="screen-levels">
      <div class="level-hero">
        <div class="level-number" id="lv-big">1</div>
        <div class="level-title-text" id="lv-title">Wanderer</div>
        <div class="xp-progress-wrap"><div class="xp-progress-bar" id="lv-progress" style="width:0%"></div></div>
        <div class="xp-label" id="lv-xp-label">0 / 100 XP</div>
      </div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num" id="stat-total-xp">0</div><div class="stat-lbl">Total XP</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-done">0</div><div class="stat-lbl">Completed</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-streak">0</div><div class="stat-lbl">Day Streak</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-cats">0</div><div class="stat-lbl">Categories</div></div>
      </div>
      <div class="section-h">Level Roadmap</div>
      <div class="level-list" id="level-list"></div>
    </div>

    <!-- BADGES TAB -->
    <div class="screen" id="screen-badges">
      <div class="sec-header"><h2>Achievements</h2><span class="count" id="badge-count">0 earned</span></div>
      <div class="badge-grid" id="badge-grid"></div>
    </div>

    <!-- JOURNAL TAB -->
    <div class="screen" id="screen-journal">
      <div class="sec-header"><h2>Memory Journal</h2><span class="count" id="journal-count">0 entries</span></div>
      <div class="journal-grid" id="journal-feed"></div>
    </div>

  </div><!-- /screens -->

  <!-- QUEST DETAIL MODAL -->
  <div id="modal-overlay" onclick="closeModal(event)">
    <div id="modal">
      <div class="modal-handle"></div>
      <div class="modal-cat" id="m-cat"></div>
      <div class="modal-title" id="m-title"></div>
      <div class="modal-desc" id="m-desc"></div>
      <div class="modal-xp-row">
        <div class="xp-big" id="m-xp"></div>
        <div class="diff-label" id="m-diff"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-full primary" id="m-accept-btn" onclick="acceptQuest()">Accept Quest</button>
        <button class="btn-full" id="m-done-btn" onclick="completeQuest()" style="display:none">Mark Complete ✓</button>
        <button class="btn-full" onclick="closeModal()">Close</button>
      </div>
      <div class="memory-section" id="memory-section" style="display:none">
        <div class="memory-label">Quest Memories</div>
        <div class="journal-grid" id="quest-journal-grid"></div>
        <label class="memory-upload-btn">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          Add photo / video
          <input type="file" accept="image/*,video/*" multiple style="display:none" onchange="addMemory(event)">
        </label>
        <button class="btn-full" style="margin-top:8px;" onclick="addNote()">+ Add written note</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script>
// =====================================================================
// DATA
// =====================================================================

const LEVELS = [
  {lvl:1,name:"Wanderer",xp:0},
  {lvl:2,name:"Drifter",xp:100},
  {lvl:3,name:"Scout",xp:250},
  {lvl:4,name:"Pathfinder",xp:500},
  {lvl:5,name:"Trickster",xp:900},
  {lvl:6,name:"Maverick",xp:1400},
  {lvl:7,name:"Renegade",xp:2000},
  {lvl:8,name:"Phantom",xp:2800},
  {lvl:9,name:"Ghost",xp:3800},
  {lvl:10,name:"Legend",xp:5000},
  {lvl:11,name:"Apex Drifter",xp:6500},
  {lvl:12,name:"Chaos Agent",xp:8500},
  {lvl:13,name:"Urban Myth",xp:11000},
  {lvl:14,name:"The One",xp:14000},

// MIND ────────────────────────────────────────────────────────────
{t:"Write a short story in one sitting",d:"Sit down with a blank page. Write a complete short story — beginning, middle, end — in a single session of 2-4 hours.",c:"MIND",xp:60,diff:"Medium"},
{t:"Meditate for 30 minutes without moving",d:"Sit comfortably. Set a timer for 30 minutes. Don't move. Don't open your eyes. Just sit with what comes up.",c:"MIND",xp:50,diff:"Medium"},
{t:"Do a full digital detox for 48 hours",d:"No phone, no computer, no TV. 48 hours of analogue life. Read, write, move, talk.",c:"MIND",xp:70,diff:"Medium"},
{t:"Read a book in a genre you hate",d:"If you hate fiction, read fiction. If you hate self-help, read self-help. All the way through. Find one thing you learned.",c:"MIND",xp:40,diff:"Easy"},
{t:"Write your life story in 500 words",d:"From birth to now. 500 words exactly. Keep every word.",c:"MIND",xp:40,diff:"Easy"},
{t:"Learn and memorise a poem",d:"A real poem — at least 20 lines. Memorise it and recite it from memory to at least one person.",c:"MIND",xp:40,diff:"Easy"},
{t:"Take a completely different route to every destination for a week",d:"No habits. Every trip you make, find a different way. Notice what you've been missing.",c:"MIND",xp:30,diff:"Easy"},
{t:"Spend a day not using any words",d:"24 hours of complete silence — no speech, no texting, no writing notes. Gesture and expression only.",c:"MIND",xp:60,diff:"Medium"},
{t:"Write a letter to your 10-years-older self",d:"Seal it. Put it somewhere you'll find it in 10 years. Be honest about what you hope and fear.",c:"MIND",xp:30,diff:"Easy"},
{t:"Do something that terrifies you socially",d:"The thing you talk yourself out of every time — a performance, a confession, an approach. Do the thing.",c:"MIND",xp:80,diff:"Hard"},
{t:"Spend an afternoon doing absolutely nothing",d:"No stimulation. Sit in a garden or empty room. Let your mind go wherever it goes. No falling asleep.",c:"MIND",xp:30,diff:"Easy"},
{t:"Watch a film in a foreign language without subtitles",d:"A full-length feature. No subtitles, no pausing. Try to follow the story from visuals and tone.",c:"MIND",xp:40,diff:"Easy"},
{t:"Write an honest review of your own life so far",d:"Like a Yelp review, but for yourself. Three stars, two major complaints, two things you'd recommend.",c:"MIND",xp:40,diff:"Easy"},
{t:"Listen to an entire album without doing anything else",d:"No phone, no scrolling. Sit in a chair and just listen to a record, front to back, at full attention.",c:"MIND",xp:20,diff:"Easy"},
{t:"Do a cold shower every day for 2 weeks",d:"30 seconds minimum. Full cold. Document how you feel on day 1 vs day 14.",c:"MIND",xp:50,diff:"Medium"},
{t:"Learn 5 philosophical concepts that changed history",d:"Stoicism, existentialism, utilitarianism, nihilism, phenomenology. Read the primary text — not just Wikipedia.",c:"MIND",xp:50,diff:"Medium"},
{t:"Fast for 24 hours",d:"Water and black coffee only. No food from midnight to midnight. Note how your mind changes.",c:"MIND",xp:60,diff:"Medium"},
{t:"Keep a journal for 30 days straight",d:"Every day. At least 300 words. Don't skip once. Read it at the end.",c:"MIND",xp:70,diff:"Medium"},
{t:"Solve a logic puzzle in under 30 minutes",d:"A real one — Einstein's puzzle, a hard Sudoku, a cryptic crossword. Set the timer.",c:"MIND",xp:40,diff:"Easy"},
{t:"Do a memory palace exercise",d:"Learn the method-of-loci technique and memorise a list of 20 unrelated items using a mental palace.",c:"MIND",xp:50,diff:"Medium"},
{t:"Learn to lucid dream",d:"Practice reality checks for 2 weeks. WILD or MILD technique. Document the first time you become aware in a dream.",c:"MIND",xp:70,diff:"Medium"},
{t:"Go a week without complaining",d:"Every time you catch yourself about to complain, stop. If you slip, restart the week. Hit 7 clean days.",c:"MIND",xp:60,diff:"Medium"},
{t:"Make a decision that scares you",d:"The thing you've been putting off — the move, the conversation, the application. Decide. Today.",c:"MIND",xp:80,diff:"Hard"},
{t:"Wake up at 5am every day for a week",d:"Alarm at 5, out of bed immediately. Use the time however you want. See who you become.",c:"MIND",xp:50,diff:"Medium"},
{t:"Learn to argue the opposite of your beliefs convincingly",d:"Take a position you fundamentally disagree with. Research it deeply. Write or speak a 5-minute defence of it.",c:"MIND",xp:50,diff:"Medium"},
{t:"Go a week without alcohol",d:"Seven consecutive days. Notice every moment you would normally reach for a drink.",c:"MIND",xp:40,diff:"Easy"},
{t:"Write a manifesto",d:"Your actual beliefs. What you stand for, what you won't tolerate. One page. Keep it.",c:"MIND",xp:50,diff:"Medium"},
{t:"Reread your oldest diary entries",d:"Find the oldest journal, letter, or text history you have. Read it all. Notice who you were.",c:"MIND",xp:20,diff:"Easy"},
{t:"Spend a full day in complete nature",d:"No buildings, no roads. A full day from sunrise to sunset entirely in natural wilderness.",c:"MIND",xp:70,diff:"Medium"},
{t:"Write the first chapter of a novel",d:"2000+ words. Characters, a world, a problem. The real first chapter of something you might actually write.",c:"MIND",xp:60,diff:"Medium"},
{t:"Forgive someone out loud",d:"Tell them. Call them, find them, or write a letter. Say the words. Don't explain or justify — just say it.",c:"MIND",xp:70,diff:"Medium"},
{t:"Try a sensory deprivation float tank",d:"Book a floatation tank session. Stay in for the full hour. Don't fight the silence.",c:"MIND",xp:60,diff:"Medium"},
{t:"Confront a fear you've had since childhood",d:"Spiders, heights, water, the dark. Find the fear and sit with it deliberately for at least 15 minutes.",c:"MIND",xp:70,diff:"Medium"},
{t:"Spend a day pretending to be from another decade",d:"1970s, 1980s, or 1920s. Dress the part. Talk the part. Refer only to things that existed in that era.",c:"MIND",xp:40,diff:"Easy"},
{t:"Do a random act of kindness that costs nothing",d:"Something genuinely meaningful for a stranger or acquaintance that requires effort but no money.",c:"MIND",xp:20,diff:"Easy"},

// CHAOS ────────────────────────────────────────────────────────────

{t:"Do something every day for 30 days",d:"Pick one discipline — cold shower, pushups, drawing, journaling, running — and do it every single day for 30 days.",c:"CHAOS",xp:90,diff:"Hard"},

{t:"Try a food from a culture you know nothing about",d:"Not the mainstream dish. The weird one. Fermented, dried, raw, or strongly flavoured. Ask the person behind the counter what it is.",c:"CHAOS",xp:20,diff:"Easy"},

{t:"Make a genuine bet on yourself",d:"A real wager — money, a public commitment — on achieving something you might fail at. Bet it. Win it.",c:"CHAOS",xp:60,diff:"Medium"},

{t:"Go one week without using any swear words",d:"Including under your breath. Every slip resets the week. Clean language only.",c:"CHAOS",xp:30,diff:"Easy"},

{t:"Try a sensory overload experience",d:"A rave, a loud concert front row, a noisy souk or market, a firework display at point-blank range. Let it wash over you.",c:"CHAOS",xp:40,diff:"Easy"},

{t:"Enter a competition you've never tried",d:"Eating, coding, art, chess, cooking, photography — any competition. Actually enter and turn up.",c:"CHAOS",xp:60,diff:"Medium"},
{t:"Give away something you love",d:"A possession that means something to you. Give it to someone who will use it or love it more.",c:"CHAOS",xp:40,diff:"Easy"},

    {t:"Learn to clean a fish and cook it",d:"Catch or buy a whole fish. Gut, scale, and fillet it yourself. Cook it simply. Eat it. Understand where your food comes from.",c:"SKILLS",xp:40,diff:"Easy"},
    {t:"Spend a day communicating only through drawings",d:"No words, no gestures — only drawings on paper or a tablet. Convey everything you need to through images. See what gets lost and what becomes clearer.",c:"MIND",xp:40,diff:"Easy"},
    {t:"Learn to use an axe properly",d:"Splitting, felling (small trees), limbing, and safety. Spend a day processing firewood with proper technique. Feel the satisfaction of a clean, powerful swing.",c:"SKILLS",xp:50,diff:"Medium"},
    {t:"Do a 'yes day' with a child",d:"Spend a full day with a kid — yours, a friend's, a relative's. Say yes to every reasonable request. See the world through their curiosity.",c:"SOCIAL",xp:40,diff:"Easy"},
  ];
  EXTRA_QUESTS.push(...handcrafted);
})();

const ALL_QUESTS = [...RAW_QUESTS, ...EXTRA_QUESTS].map((q,i)=>({...q, id:i+1}));

// =====================================================================
// STATE & STORAGE
// =====================================================================
let state = {
  xp: 0,
  completedIds: [],
  activeIds: [],
  memories: {},
  xpHistory: [],
  currentFilter: 'ALL',
  earnedBadges: [],
};

function saveState() {
  try { localStorage.setItem('sqstate', JSON.stringify(state)); } catch(e){}
}
function loadState() {
  try {
    const s = localStorage.getItem('sqstate');
    if(s) state = {...state, ...JSON.parse(s)};
  } catch(e){}
}

// =====================================================================
// ACHIEVEMENTS / BADGES
// =====================================================================
const BADGES = [
  {id:'first', name:'First Quest', desc:'Complete any quest.', check:()=>state.completedIds.length>=1},
  {id:'centurion', name:'Centurion', desc:'Complete 100 quests.', check:()=>state.completedIds.length>=100},
  {id:'allrounder', name:'All-Rounder', desc:'Complete at least one quest in every category.', check:()=>{
    const cats = new Set(state.completedIds.map(id=>ALL_QUESTS.find(q=>q.id===id)?.c||'').filter(Boolean));
    return cats.size >= 6;
  }},
  {id:'daredevil', name:'Daredevil', desc:'Complete 5 Hard quests in a row.', check:()=>{
    const completed = state.completedIds.map(id=>ALL_QUESTS.find(q=>q.id===id)).filter(Boolean);
    let streak=0, maxStreak=0;
    for(const q of completed) {
      if(q.diff==='Hard') streak++; else streak=0;
      if(streak>maxStreak) maxStreak=streak;
    }
    return maxStreak>=5;
  }},
  {id:'collector', name:'Collector', desc:'Store 20 memories.', check:()=>Object.values(state.memories).flat().length>=20},
  {id:'earlyriser', name:'Early Riser', desc:'Log a quest before 7am.', check:()=>{
    const today = new Date().toISOString().split('T')[0];
    const entry = state.xpHistory.find(e=>e.date===today && e.early);
    return !!entry;
  }},
  {id:'nightowl', name:'Night Owl', desc:'Log a quest after midnight.', check:()=>{
    const today = new Date().toISOString().split('T')[0];
    const entry = state.xpHistory.find(e=>e.date===today && e.night);
    return !!entry;
  }},
];

function checkBadges() {
  const earned = [];
  BADGES.forEach(b=>{
    if(!state.earnedBadges.includes(b.id) && b.check()) {
      state.earnedBadges.push(b.id);
      earned.push(b);
    }
  });
  if(earned.length) {
    earned.forEach(b=>showToast(`Badge earned: ${b.name}`));
    saveState();
  }
}

// =====================================================================
// QUEST LOGIC
// =====================================================================
let currentQuestId = null;
let displayedQuests = [];
let shuffleSeed = Date.now();

function seededShuffle(arr, seed) {
  const a = [...arr];
  let s = seed;
  for(let i = a.length-1; i>0; i--) {
    s = (s * 1103515245 + 12345) & 0x7fffffff;
    const j = s % (i+1);
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function getAvailableQuests() {
  return ALL_QUESTS.filter(q => !state.completedIds.includes(q.id));
}

function getDisplayedQuests() {
  let quests = getAvailableQuests();
  if(state.currentFilter !== 'ALL') quests = quests.filter(q => q.cat === state.currentFilter || q.c === state.currentFilter);
  return seededShuffle(quests, shuffleSeed).slice(0, 30);
}

// =====================================================================
// LEVEL LOGIC
// =====================================================================
function getCurrentLevel() {
  let lv = LEVELS[0];
  for(const l of LEVELS) { if(state.xp >= l.xp) lv = l; }
  return lv;
}
function getNextLevel() {
  const idx = LEVELS.findIndex(l => l.lvl === getCurrentLevel().lvl);
  return LEVELS[idx+1] || null;
}
function getLevelProgress() {
  const cur = getCurrentLevel();
  const nxt = getNextLevel();
  if(!nxt) return 100;
  return Math.round(((state.xp - cur.xp) / (nxt.xp - cur.xp)) * 100);
}

// =====================================================================
// RENDER FUNCTIONS
// =====================================================================
function renderQuestCard(q, context='quests') {
  const isActive = state.activeIds.includes(q.id);
  const isCompleted = state.completedIds.includes(q.id);
  const xpClass = q.xp >= 80 ? 'high' : '';
  const catKey = q.c || q.cat;
  return `
  <div class="quest-card ${isCompleted?'completed':''}" onclick="openModal(${q.id})">
    <div class="quest-meta">
      <span class="cat-tag cat-${catKey}">${catKey}</span>
      <span class="xp-tag ${xpClass}">${q.xp} XP · ${q.diff}</span>
    </div>
    <div class="quest-title">${q.t}</div>
    ${context==='quests' ? '' : `<div class="quest-desc">${q.d.substring(0,80)}...</div>`}
    <div class="quest-actions" onclick="event.stopPropagation()">
      ${isCompleted
        ? `<span class="btn-sm done">✓ Done</span>`
        : isActive
          ? `<button class="btn-sm primary" onclick="completeQuestById(${q.id})">Complete</button><button class="btn-sm" onclick="openModal(${q.id})">Details</button>`
          : `<button class="btn-sm primary" onclick="acceptQuestById(${q.id})">Accept</button><button class="btn-sm" onclick="openModal(${q.id})">Details</button>`
      }
    </div>
  </div>`;
}

function renderQuestList() {
  displayedQuests = getDisplayedQuests();
  const el = document.getElementById('quest-list');
  const countEl = document.getElementById('quest-count');
  if(displayedQuests.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="big-icon">🎉</div><p>All quests in this category completed!<br>You're a legend.</p></div>`;
    countEl.textContent = '0 quests';
    return;
  }
  countEl.textContent = `${displayedQuests.length} quests`;
  el.innerHTML = displayedQuests.map(q => renderQuestCard(q, 'quests')).join('');
}

function renderActiveList() {
  const quests = ALL_QUESTS.filter(q => state.activeIds.includes(q.id));
  const el = document.getElementById('active-list');
  document.getElementById('active-count').textContent = quests.length;
  if(!quests.length) { el.innerHTML = `<div class="empty-state"><div class="big-icon">⚡</div><p>No active quests.<br>Head to Quests and accept one.</p></div>`; return; }
  el.innerHTML = quests.map(q => renderQuestCard(q, 'active')).join('');
}

function renderCompletedList() {
  const quests = ALL_QUESTS.filter(q => state.completedIds.includes(q.id)).reverse();
  const el = document.getElementById('completed-list');
  document.getElementById('completed-count').textContent = quests.length;
  if(!quests.length) { el.innerHTML = `<div class="empty-state"><div class="big-icon">🏆</div><p>No completed quests yet.<br>Go do something wild.</p></div>`; return; }
  el.innerHTML = quests.map(q => renderQuestCard(q, 'completed')).join('');
}

function renderStats() {
  const cats = ['ADVENTURE','SKILLS','SOCIAL','URBAN','MIND','CHAOS'];
  const catColors = [CAT_COLORS.ADVENTURE, CAT_COLORS.SKILLS, CAT_COLORS.SOCIAL, CAT_COLORS.URBAN, CAT_COLORS.MIND, CAT_COLORS.CHAOS];
  const counts = {};
  cats.forEach(c => counts[c] = 0);
  state.completedIds.forEach(id => {
    const q = ALL_QUESTS.find(x => x.id===id);
    if(q) counts[q.c || q.cat] = (counts[q.c || q.cat]||0)+1;
  });
  const maxCount = Math.max(...Object.values(counts), 1);
  const el = document.getElementById('cat-bar-chart');
  el.innerHTML = cats.map((c,i) => `
    <div class="bar-row">
      <div class="bar-label">${c.charAt(0)+c.slice(1).toLowerCase()}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(counts[c]/maxCount*100)}%;background:${catColors[i]}"></div></div>
      <div class="bar-count">${counts[c]}</div>
    </div>`).join('');

  const canvas = document.getElementById('xp-chart');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * window.devicePixelRatio || 600;
  canvas.height = 120 * window.devicePixelRatio || 120;
  ctx.scale(window.devicePixelRatio||1, window.devicePixelRatio||1);
  const w = canvas.offsetWidth || 300;
  const h = 120;
  ctx.clearRect(0,0,w,h);
  const hist = state.xpHistory.slice(-14);
  if(hist.length > 1) {
    const maxXp = Math.max(...hist.map(x=>x.cumXp),1);
    const pts = hist.map((x,i) => [i/(hist.length-1)*w, h - (x.cumXp/maxXp)*(h-16) - 8]);
    ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
    pts.forEach(p => ctx.lineTo(p[0],p[1]));
    ctx.strokeStyle = '#8FAE8B'; ctx.lineWidth = 2; ctx.stroke();
    ctx.lineTo(w,h); ctx.lineTo(0,h); ctx.closePath();
    ctx.fillStyle = 'rgba(143,174,139,0.15)'; ctx.fill();
    pts.forEach(p => { ctx.beginPath(); ctx.arc(p[0],p[1],3,0,Math.PI*2); ctx.fillStyle='#8FAE8B'; ctx.fill(); });
  } else {
    ctx.fillStyle = '#9B9B92'; ctx.font = '13px Space Grotesk'; ctx.textAlign='center';
    ctx.fillText('Complete quests to see XP history', w/2, h/2);
  }

  const recent = ALL_QUESTS.filter(q => state.completedIds.includes(q.id)).slice(-5).reverse();
  const rEl = document.getElementById('recent-completed');
  if(!recent.length) { rEl.innerHTML = `<p style="color:var(--gray);font-size:13px">No completions yet.</p>`; return; }
  rEl.innerHTML = recent.map(q => `
    <div class="recent-item">
      <div class="recent-dot"></div>
      <div class="recent-name">${q.t}</div>
      <div class="recent-xp">+${q.xp} XP</div>
    </div>`).join('');
}

function renderLevels() {
  const cur = getCurrentLevel();
  const nxt = getNextLevel();
  const prog = getLevelProgress();
  document.getElementById('lv-big').textContent = cur.lvl;
  document.getElementById('lv-title').textContent = cur.name;
  document.getElementById('lv-progress').style.width = prog+'%';
  document.getElementById('lv-xp-label').textContent = nxt ? `${state.xp} / ${nxt.xp} XP` : `${state.xp} XP — MAX LEVEL`;
  document.getElementById('stat-total-xp').textContent = state.xp;
  document.getElementById('stat-done').textContent = state.completedIds.length;
  document.getElementById('stat-streak').textContent = calculateStreak();
  const cats = new Set(state.completedIds.map(id => { const q=ALL_QUESTS.find(x=>x.id===id); return q?q.c||q.cat:''; }));
  cats.delete('');
  document.getElementById('stat-cats').textContent = cats.size;

  const el = document.getElementById('level-list');
  el.innerHTML = LEVELS.map(l => {
    const reached = state.xp >= l.xp;
    const isCur = l.lvl === cur.lvl;
    return `<div class="level-row">
      <div class="lv-circle ${reached&&!isCur?'reached':''} ${isCur?'current':''}">${l.lvl}</div>
      <div class="lv-info"><div class="lv-name">${l.name}</div><div class="lv-xp">${l.xp} XP</div></div>
      ${isCur ? '<span style="font-size:12px;color:var(--sage);font-weight:600">YOU ARE HERE</span>' : ''}
    </div>`;
  }).join('');

  document.getElementById('xp-bar').style.width = prog+'%';
  document.getElementById('level-badge').textContent = `LVL ${cur.lvl}`;
}

function renderBadges() {
  const el = document.getElementById('badge-grid');
  document.getElementById('badge-count').textContent = `${state.earnedBadges.length} earned`;
  el.innerHTML = BADGES.map(b => {
    const earned = state.earnedBadges.includes(b.id);
    return `
    <div class="badge-card ${earned?'earned':''}">
      <div class="badge-icon">${earned ? '★' : '☆'}</div>
      <div class="badge-name">${b.name}</div>
      <div class="badge-desc">${b.desc}</div>
    </div>`;
  }).join('');
}

function renderJournal() {
  const allMems = [];
  for(const [qid, mems] of Object.entries(state.memories)) {
    const q = ALL_QUESTS.find(q=>q.id==parseInt(qid));
    if(!q) continue;
    mems.forEach(m => allMems.push({...m, qid, questName: q.t}));
  }
  allMems.sort((a,b)=>b.date - a.date);
  document.getElementById('journal-count').textContent = `${allMems.length} entries`;
  const feed = document.getElementById('journal-feed');
  if(!allMems.length) {
    feed.innerHTML = `<div class="empty-state"><div class="big-icon">📔</div><p>Your memory journal is empty.<br>Complete quests and add memories.</p></div>`;
    return;
  }
  feed.innerHTML = allMems.map(m => {
    const rot = (Math.random()*6 - 3).toFixed(1);
    let content = '';
    if(m.type==='img') content = `<img src="${m.data}" alt="memory">`;
    else if(m.type==='vid') content = `<video src="${m.data}" controls></video>`;
    if(m.note) content += `<div class="journal-note">${m.note}</div>`;
    return `
    <div class="journal-card" style="--rot:${rot}deg">
      <div style="font-size:11px;font-weight:600;color:var(--sage);margin-bottom:4px;">${m.questName}</div>
      ${content}
      <div class="journal-date">${new Date(m.date).toLocaleDateString()}</div>
    </div>`;
  }).join('');
}

// =====================================================================
// MODAL & MEMORIES
// =====================================================================
function openModal(questId) {
  const q = ALL_QUESTS.find(x => x.id===questId);
  if(!q) return;
  currentQuestId = questId;
  const catKey = q.c || q.cat;
  document.getElementById('m-cat').textContent = catKey;
  document.getElementById('m-cat').className = `modal-cat cat-tag cat-${catKey}`;
  document.getElementById('m-title').textContent = q.t;
  document.getElementById('m-desc').textContent = q.d;
  document.getElementById('m-xp').textContent = `+${q.xp} XP`;
  document.getElementById('m-diff').textContent = `Difficulty: ${q.diff}`;

  const isActive = state.activeIds.includes(questId);
  const isCompleted = state.completedIds.includes(questId);
  const acceptBtn = document.getElementById('m-accept-btn');
  const doneBtn = document.getElementById('m-done-btn');
  const memSection = document.getElementById('memory-section');

  if(isCompleted) {
    acceptBtn.style.display='block'; acceptBtn.textContent='✓ Completed'; acceptBtn.disabled=true; acceptBtn.style.opacity='0.5';
    doneBtn.style.display='none';
    memSection.style.display='block';
  } else if(isActive) {
    acceptBtn.style.display='none'; doneBtn.style.display='block';
    memSection.style.display='block';
  } else {
    acceptBtn.style.display='block'; doneBtn.style.display='none';
    acceptBtn.textContent='Accept Quest';
    memSection.style.display='none';
  }

  renderQuestMemories(questId);
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if(!e || e.target===document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
    currentQuestId = null;
  }
}

function acceptQuest() {
  if(!currentQuestId) return;
  if(state.completedIds.includes(currentQuestId)) return;
  if(!state.activeIds.includes(currentQuestId)) {
    state.activeIds.push(currentQuestId);
    saveState();
    showToast('Quest accepted!');
    document.getElementById('m-accept-btn').style.display='none';
    document.getElementById('m-done-btn').style.display='block';
    document.getElementById('memory-section').style.display='block';
    renderActiveList();
    renderQuestList();
  }
}

function acceptQuestById(id) {
  if(state.completedIds.includes(id)) return;
  if(!state.activeIds.includes(id)) {
    state.activeIds.push(id);
    saveState();
    showToast('Quest accepted!');
    renderQuestList();
    renderActiveList();
  }
}

function completeQuest() {
  if(!currentQuestId) return;
  completeQuestById(currentQuestId);
  closeModal();
}

function completeQuestById(id) {
  if(state.completedIds.includes(id)) return;
  const q = ALL_QUESTS.find(x=>x.id===id);
  if(!q) return;
  state.completedIds.push(id);
  state.activeIds = state.activeIds.filter(x=>x!==id);
  state.xp += q.xp;

  const now = new Date();
  const today = now.toISOString().split('T')[0];
  const hours = now.getHours();
  const lastEntry = state.xpHistory[state.xpHistory.length-1];
  const early = hours < 7;
  const night = hours >= 0 && hours < 5;
  if(lastEntry && lastEntry.date === today) {
    lastEntry.xp += q.xp; lastEntry.cumXp = state.xp;
    lastEntry.early = lastEntry.early || early;
    lastEntry.night = lastEntry.night || night;
  } else {
    state.xpHistory.push({date:today, xp:q.xp, cumXp:state.xp, early, night});
  }

  saveState();
  checkBadges();
  showToast(`+${q.xp} XP earned!`);
  renderAll();
}

function renderQuestMemories(questId) {
  const mems = state.memories[questId] || [];
  const grid = document.getElementById('quest-journal-grid');
  if(!mems.length) { grid.innerHTML=''; return; }
  grid.innerHTML = mems.map((m,i) => {
    const rot = (Math.random()*6 - 3).toFixed(1);
    let content = '';
    if(m.type==='img') content = `<img src="${m.data}" alt="memory">`;
    else if(m.type==='vid') content = `<video src="${m.data}" controls></video>`;
    if(m.note) content += `<div class="journal-note">${m.note}</div>`;
    return `
    <div class="journal-card" style="--rot:${rot}deg">
      ${content}
      <div class="journal-date">${new Date(m.date).toLocaleDateString()}</div>
    </div>`;
  }).join('');
}

function addMemory(event) {
  const files = Array.from(event.target.files);
  if(!currentQuestId || !files.length) return;
  if(!state.memories[currentQuestId]) state.memories[currentQuestId]=[];
  let loaded=0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      state.memories[currentQuestId].push({
        type: file.type.startsWith('video')?'vid':'img',
        data: e.target.result,
        date: Date.now()
      });
      loaded++;
      if(loaded===files.length) { saveState(); renderQuestMemories(currentQuestId); showToast('Memory added'); }
    };
    reader.readAsDataURL(file);
  });
  event.target.value='';
}

function addNote() {
  if(!currentQuestId) return;
  const note = prompt('Write a note for this quest:');
  if(!note || !note.trim()) return;
  if(!state.memories[currentQuestId]) state.memories[currentQuestId]=[];
  state.memories[currentQuestId].push({ type:'note', note:note.trim(), date: Date.now() });
  saveState();
  renderQuestMemories(currentQuestId);
  showToast('Note added');
}

function viewMemory(questId, idx) {
  const m = (state.memories[questId]||[])[idx];
  if(!m) return;
  const w = window.open('','_blank');
  if(m.type==='img') { w.document.write(`<img src="${m.data}" style="max-width:100%;max-height:100vh">`); }
  else { w.document.write(`<video src="${m.data}" controls autoplay style="max-width:100%;max-height:100vh"></video>`); }
}

// =====================================================================
// TABS & FILTERS
// =====================================================================
let currentTab = 'quests';
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  event.currentTarget.classList.add('active');
  if(tab==='stats') renderStats();
  else if(tab==='levels') renderLevels();
  else if(tab==='completed') renderCompletedList();
  else if(tab==='active') renderActiveList();
  else if(tab==='badges') renderBadges();
  else if(tab==='journal') renderJournal();
  else renderQuestList();
}

function filterCat(cat) {
  state.currentFilter = cat;
  document.querySelectorAll('.filter-pill').forEach(p => {
    p.classList.toggle('active', p.textContent.toUpperCase()===cat || (cat==='ALL' && p.textContent==='All'));
  });
  renderQuestList();
}

function shuffleQuests() {
  shuffleSeed = Date.now();
  renderQuestList();
  const btn = document.querySelector('.shuffle-btn svg');
  btn.style.transform = 'rotate(360deg)';
  setTimeout(()=>btn.style.transform='rotate(0deg)',500);
}

// =====================================================================
// TOAST
// =====================================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

function calculateStreak() {
  if(!state.xpHistory.length) return 0;
  let streak = 0;
  const hist = [...state.xpHistory].reverse();
  let checkDate = new Date();
  for(const entry of hist) {
    if(new Date(entry.date).toDateString() === checkDate.toDateString()) {
      streak++;
      checkDate.setDate(checkDate.getDate()-1);
    } else break;
  }
  return streak;
}

function renderAll() {
  renderQuestList();
  renderActiveList();
  renderCompletedList();
  if(currentTab==='levels') renderLevels();
  if(currentTab==='badges') renderBadges();
  if(currentTab==='journal') renderJournal();
  if(currentTab==='stats') renderStats();
}

// =====================================================================
// INIT
// =====================================================================
loadState();
renderAll();
</script>
</body>
</html>
