{t:"Attend an open mic night as audience",d:"Not performing — just watching. Sit in the front row. Pay attention to every act. Applaud genuinely. Talk to a performer afterward about their set.",c:"URBAN",xp:20,diff:"Easy"},
{t:"Find a publicly accessible rooftop",d:"Library, gallery, hotel bar, multi-story car park. Somewhere high with a legitimate, legal way to get up there. Go at sunset.",c:"URBAN",xp:30,diff:"Easy"},
{t:"Eat at 7 different cuisines in 7 days",d:"One cuisine per day for a week. No repeats. All sit-down restaurants or proper food stalls. Expand your palate.",c:"URBAN",xp:50,diff:"Medium"},
{t:"Spend a full day with zero spending",d:"Not even a coffee. Navigate a full day — food, transport, entertainment — without spending a single cent. Plan ahead or improvise.",c:"URBAN",xp:30,diff:"Easy"},
{t:"Find the city's weirdest shop",d:"Taxidermy supplies, vintage medical equipment, a button museum, a shop that only sells left-handed items. Find the strangest retail space near you. Go inside. Stay a while.",c:"URBAN",xp:30,diff:"Easy"},
{t:"Map an unlisted alleyway shortcut",d:"Find an alley, cut-through, or pedestrian passage in your neighbourhood that doesn't appear on Google Maps. Walk it. Time it. Use it regularly.",c:"URBAN",xp:30,diff:"Easy"},
{t:"Take a photo at the exact geographic centre of your city",d:"Research where the geographic centre is. Go there. Stand on it. Take a photo that proves you were there.",c:"URBAN",xp:30,diff:"Easy"},
{t:"Find the city's best cheap meal",d:"Ask 10 locals: 'Where's the best meal in this city for under $10?' Go to the most-recommended spot. Order that meal. Confirm or deny.",c:"URBAN",xp:30,diff:"Easy"},
{t:"Ride a city bike share from one end of town to the other",d:"Grab a bike from a dock at the northernmost or westernmost station. Ride to the opposite extreme. Dock it. Time yourself.",c:"URBAN",xp:50,diff:"Medium"},
{t:"Visit a place of worship you've never been to",d:"A mosque, temple, church, synagogue, or gurdwara of a faith different from your own. Be respectful. Observe. Learn something about how others find meaning.",c:"URBAN",xp:30,diff:"Easy"},
{t:"Find the city's narrowest building",d:"Research, find, and visit the skinniest building in your city. Try to go inside if possible. Measure its width with your arm span.",c:"URBAN",xp:20,diff:"Easy"},
{t:"Do a full day in a single neighbourhood",d:"Pick a neighbourhood you rarely visit. Spend 8+ hours there. Eat breakfast, lunch, and dinner. Visit shops, parks, and cafés. Talk to residents. Know it by day's end.",c:"URBAN",xp:50,diff:"Medium"},
{t:"Take a free walking tour of your own city",d:"Join a free tour meant for tourists. Learn things about your city you never knew. Tip the guide well. See your home through a visitor's eyes.",c:"URBAN",xp:30,diff:"Easy"},
{t:"Find a diner open 24 hours and stay until sunrise",d:"The kind with formica tables and bottomless coffee. Arrive after midnight. Order food at 3am. Watch the early shift come in. Leave when the sun's fully up.",c:"URBAN",xp:50,diff:"Medium"},
{t:"Document every piece of public art in a 1km radius",d:"Pick a central point. Walk every street within 1km. Photograph and note every sculpture, mural, installation, and statue. Create a personal catalogue.",c:"URBAN",xp:60,diff:"Medium"},
{t:"Find and photograph all the city's ghost signs",d:"Those faded painted advertisements on old brick buildings. Research, locate, and photograph every one you can find. Note what they were selling and when.",c:"URBAN",xp:50,diff:"Medium"},
{t:"Eat something that's the city's signature dish",d:"Every city has one — the dish it's known for. Find the place that does it best according to locals. Order it. Understand why it defines the place.",c:"URBAN",xp:30,diff:"Easy"},
{t:"Take public transport to the last stop",d:"Ride a bus, tram, or train line all the way to its terminal station — the one where everyone gets off. Explore what's there. Ride back.",c:"URBAN",xp:30,diff:"Easy"},
{t:"Find a bridge and cross it on foot",d:"A real bridge — not a pedestrian overpass. Walk the full span. Stop in the middle. Look down at what's below. Count the vehicles that pass.",c:"URBAN",xp:20,diff:"Easy"},
{t:"Visit your city's oldest cemetery",d:"Walk among the oldest graves. Read the names and dates. Find the person who lived the longest and the one who died the youngest. Consider your own timeline.",c:"URBAN",xp:30,diff:"Easy"},
{t:"Go to a restaurant and ask the server to order for you",d:"Tell them: 'Order me what you think I should eat.' Trust them completely. Eat whatever arrives. Tip generously for the adventure.",c:"URBAN",xp:20,diff:"Easy"},
{t:"Find and photograph every clock tower in the city",d:"Map them all — train stations, churches, civic buildings. Visit each one. Photograph them at different times of day. Notice which ones still keep accurate time.",c:"URBAN",xp:50,diff:"Medium"},

// MIND ────────────────────────────────────────────────────────────
{t:"Write a short story in one sitting",d:"Sit with a blank page or document. Write a complete short story — beginning, middle, end — in a single session of 2-4 hours. No editing until you're done. Just get the story out.",c:"MIND",xp:60,diff:"Medium"},
{t:"Meditate for 30 minutes without moving",d:"Find a comfortable seated position. Set a timer for 30 minutes. Close your eyes. Don't move a muscle. When thoughts come — and they will — just observe them. Stay until the timer sounds.",c:"MIND",xp:50,diff:"Medium"},
{t:"Do a full digital detox for 48 hours",d:"No phone, no computer, no TV, no screens at all. For 48 hours, live an analogue life. Read paper books, write with pen, walk outside, talk face-to-face. Notice what you reach for.",c:"MIND",xp:70,diff:"Medium"},
{t:"Read a book in a genre you hate",d:"If you hate romance, read romance. If you dismiss fantasy, read fantasy. Pick a well-regarded book in a genre you avoid. Read it all the way through. Find at least one thing valuable.",c:"MIND",xp:40,diff:"Easy"},
{t:"Write your life story in 500 words exactly",d:"From birth to this moment. 500 words — not 499, not 501. Every word must earn its place. Distill your existence to its essence.",c:"MIND",xp:40,diff:"Easy"},
{t:"Learn and memorise a poem",d:"At least 20 lines — a real poem by a real poet. Memorise it completely. Recite it from memory to at least one other person. Feel the rhythm in your bones.",c:"MIND",xp:40,diff:"Easy"},
{t:"Take a completely different route everywhere for a week",d:"No habitual paths. To work, to the shop, to friends' houses — every trip takes a new route. Notice everything you've been walking past for years.",c:"MIND",xp:30,diff:"Easy"},
{t:"Spend a day not using any words",d:"24 hours of complete silence. No speech, no texting, no writing notes, no mouthing words. Communicate only through gesture, expression, and presence.",c:"MIND",xp:60,diff:"Medium"},
{t:"Write a letter to your 10-years-older self",d:"Seal it in an envelope. Write a date 10 years from now on it. Put it somewhere safe. Be honest about what you hope and fear for the person you'll become.",c:"MIND",xp:30,diff:"Easy"},
{t:"Do something that terrifies you socially",d:"The thing you talk yourself out of every single time — a performance, a difficult conversation, an approach, a confession. Identify it. Do it this week.",c:"MIND",xp:80,diff:"Hard"},
{t:"Spend an afternoon doing absolutely nothing",d:"No phone, no book, no music, no task. Sit in a chair or on grass. Let your mind wander freely. Don't fall asleep. Just be. For 3 hours minimum.",c:"MIND",xp:30,diff:"Easy"},
{t:"Watch a film in a foreign language without subtitles",d:"A full-length feature film. No subtitles, no dubbing, no pausing. Try to follow the story from visuals, tone, and context alone. See how much you understand.",c:"MIND",xp:40,diff:"Easy"},
{t:"Write an honest review of your own life so far",d:"Like a Yelp review. Star rating. Two major complaints. Two things you'd recommend. Write it as if a stranger will read it. Be brutally fair.",c:"MIND",xp:40,diff:"Easy"},
{t:"Listen to an album without doing anything else",d:"Dark room or comfortable chair. Good headphones. A full album from start to finish. No scrolling, no reading, no moving. Just listen. Every note. Every silence.",c:"MIND",xp:20,diff:"Easy"},
{t:"Do a cold shower every day for 2 weeks",d:"At the end of your normal shower, turn it fully cold. Stay under for at least 30 seconds. Breathe through the shock. Do this 14 days straight. Journal how day 1 feels vs day 14.",c:"MIND",xp:50,diff:"Medium"},
{t:"Learn 5 philosophical concepts deeply",d:"Stoicism, existentialism, utilitarianism, absurdism, phenomenology. For each, read the primary source — Marcus Aurelius, Sartre, Mill, Camus, Merleau-Ponty. Write one paragraph on each in your own words.",c:"MIND",xp:50,diff:"Medium"},
{t:"Fast for 24 hours",d:"Water and black coffee or tea only. No food from dinner to dinner. Notice when hunger comes, peaks, and passes. Observe how your mind changes when your body thinks it's starving.",c:"MIND",xp:60,diff:"Medium"},
{t:"Keep a journal for 30 days straight",d:"Every single day for a month. At least 300 words. No skipping. Write anything — what happened, what you felt, what you're afraid of. On day 31, read the whole thing.",c:"MIND",xp:70,diff:"Medium"},
{t:"Solve a serious logic puzzle",d:"Einstein's riddle, a cryptic crossword, a hard Sudoku, or a formal logic proof. Set a timer for 30 minutes. Solve it without looking up hints.",c:"MIND",xp:40,diff:"Easy"},
{t:"Build a memory palace",d:"Learn the method of loci — the ancient Greek memory technique. Build a mental palace with 20 rooms. Place 20 items in it. Recall them perfectly 24 hours later.",c:"MIND",xp:50,diff:"Medium"},
{t:"Learn to lucid dream",d:"Practice reality checks for 2 weeks. Keep a dream journal. Try the WILD or MILD technique. The first time you become aware you're dreaming — fly.",c:"MIND",xp:70,diff:"Medium"},
{t:"Go a week without complaining",d:"No verbal complaints. No internal griping either — catch yourself. Every time you slip, the week resets. Reach 7 clean days. See what it does to your brain.",c:"MIND",xp:60,diff:"Medium"},
{t:"Make a decision that scares you",d:"The one you've been putting off — leaving, staying, applying, quitting, confessing. Decide today. Act within 48 hours. Live with the consequences.",c:"MIND",xp:80,diff:"Hard"},
{t:"Wake up at 5am every day for a week",d:"Alarm at 5:00. Feet on floor immediately. No snooze. Use the extra hours however you want — exercise, reading, writing, thinking. See who you become at dawn.",c:"MIND",xp:50,diff:"Medium"},
{t:"Argue the opposite of your beliefs convincingly",d:"Take a position you fundamentally disagree with. Research it deeply — read the best arguments for it. Write or speak a 5-minute defence so convincing it disturbs you.",c:"MIND",xp:50,diff:"Medium"},
{t:"Go a week without alcohol",d:"Seven consecutive days. No exceptions. Notice every moment you would normally reach for a drink. Observe what you use alcohol to avoid or enhance.",c:"MIND",xp:40,diff:"Easy"},
{t:"Write a personal manifesto",d:"What you stand for. What you won't tolerate. What you believe about life, love, work, and death. One page. Write it like you mean it. Keep it where you'll see it.",c:"MIND",xp:50,diff:"Medium"},
{t:"Reread your oldest diary entries",d:"Find the oldest journal, letters, or message history you still have. Read every word. Notice who you were. Forgive them for what they didn't know.",c:"MIND",xp:20,diff:"Easy"},
{t:"Spend a full day in complete nature",d:"No buildings, no roads, no human-made structures visible. From sunrise to sunset in wilderness. Bring food and water. Sit. Walk. Listen. Be a creature.",c:"MIND",xp:70,diff:"Medium"},
{t:"Write the first chapter of a novel",d:"2000+ words. Real characters with real problems. A setting you can see. A voice that's yours. The actual first chapter of something you might finish one day.",c:"MIND",xp:60,diff:"Medium"},
{t:"Forgive someone out loud",d:"Tell them — call, visit, or write. Say the words: 'I forgive you.' Don't explain or justify. Just release the debt. Mean it.",c:"MIND",xp:70,diff:"Medium"},
{t:"Try a sensory deprivation float tank",d:"Book a floatation tank session. Strip down, get in the dark, silent, body-temperature water. Stay in for the full hour. Don't fight the strangeness. Let your mind unspool.",c:"MIND",xp:60,diff:"Medium"},
{t:"Confront a childhood fear",d:"The one that's been with you since you were small — spiders, heights, deep water, the dark. Find it. Sit with it deliberately for at least 15 minutes. Breathe.",c:"MIND",xp:70,diff:"Medium"},
{t:"Spend a day pretending to be from another decade",d:"Dress, speak, and behave as if it's 1975, 1922, or 1987. No modern references. No phone. See how the world looks through a different era's eyes.",c:"MIND",xp:40,diff:"Easy"},
{t:"Do a random act of kindness that costs nothing",d:"Something genuinely meaningful — help a stranger carry something heavy, leave a detailed positive review for a small business, spend an hour picking up litter. Effort, not money.",c:"MIND",xp:20,diff:"Easy"},
{t:"Write a letter to someone who hurt you — and don't send it",d:"Get it all out. Every feeling, every memory, every thing you wish you'd said. Write until there's nothing left. Then burn it, delete it, or seal it away. The act is the release.",c:"MIND",xp:40,diff:"Easy"},
{t:"Spend a day with no opinions",d:"No judgments, no preferences, no 'this is good' or 'that is bad.' Observe everything neutrally. When asked what you think, genuinely consider that you might not know.",c:"MIND",xp:50,diff:"Medium"},
{t:"Read one poem every morning for a month",d:"Before you check your phone. A different poem each day. Read it aloud if possible. Let it sit in your mind through the day.",c:"MIND",xp:30,diff:"Easy"},
{t:"Learn the names of 20 birds in your area",d:"Get a field guide or app. Go outside. Identify 20 distinct bird species by sight and at least 5 by their calls. Know your non-human neighbours.",c:"MIND",xp:50,diff:"Medium"},
{t:"Practice negative visualisation for a week",d:"Each morning, imagine losing something you value — your health, a loved one, your home. Feel the loss vividly. Then open your eyes to what you still have. Gratitude through subtraction.",c:"MIND",xp:50,diff:"Medium"},
{t:"Write down everything you remember from childhood",d:"Sit for 2 hours with a notebook. Write every memory that surfaces — people, places, sensations, smells. Don't organise. Just capture. See what you've been carrying.",c:"MIND",xp:50,diff:"Medium"},
{t:"Do a full day without looking in a mirror",d:"Cover them if needed. No checking your reflection. See how it changes your relationship with your appearance. Notice how much mental energy goes to self-monitoring.",c:"MIND",xp:30,diff:"Easy"},
{t:"Spend a day asking questions instead of making statements",d:"Every time you'd normally assert something, ask a question instead. Be genuinely curious about the answers. See how conversations change.",c:"MIND",xp:40,diff:"Easy"},
{t:"Learn and practice box breathing",d:"4 seconds in, 4 hold, 4 out, 4 hold. Use it during stressful moments for a week. Notice the physiological calm it produces. Teach it to someone else.",c:"MIND",xp:20,diff:"Easy"},
{t:"Delete social media from your phone for 30 days",d:"All of it. Gone from the phone. Check only from a computer if you must — but try not to. Fill the reclaimed time with something that uses your hands.",c:"MIND",xp:70,diff:"Medium"},
{t:"Spend a day alone in silence in nature",d:"No talking, no music, no podcasts. Find a natural space — forest, beach, mountain. Be there alone from morning to evening. Just you and the non-human world.",c:"MIND",xp:60,diff:"Medium"},
{t:"Write a eulogy for yourself",d:"As if read by someone who loved you deeply and told the truth. What would they say about how you lived? What would you want them to say? Read it aloud.",c:"MIND",xp:60,diff:"Medium"},

// CHAOS ────────────────────────────────────────────────────────────
{t:"Do the most extreme thing on a menu",d:"The spiciest dish, the largest portion, the weirdest ingredient combination. Order the thing the server warns you about. Finish every bite. Sign the waiver if there is one.",c:"CHAOS",xp:40,diff:"Easy"},
{t:"Start a rumour about yourself and watch it spread",d:"Tell one person something interesting but completely false about yourself. Something harmless and intriguing. Don't tell anyone else. Trace how it mutates and spreads over the next month.",c:"CHAOS",xp:30,diff:"Easy"},
{t:"Host a silent disco",d:"Rent or borrow wireless headphones. Create 3 different playlists on different channels. Everyone dances to their own music in the same room. Watch strangers dance to silence.",c:"CHAOS",xp:60,diff:"Medium"},
{t:"Do a 72-hour personal challenge",d:"Design your own challenge — physical, mental, dietary, or behavioural. Make it genuinely hard. Complete it for 3 full days. Document the experience hourly.",c:"CHAOS",xp:70,diff:"Medium"},
{t:"Eat something you've always said you'd never eat",d:"The thing that makes you say 'I could never.' Insects, organ meat, a notoriously disgusting food. Find it. Prepare it properly. Eat it with an open mind. You might surprise yourself.",c:"CHAOS",xp:30,diff:"Easy"},
{t:"Go somewhere new every day for a week",d:"A café, a park, a neighbourhood, a street, a town — somewhere you've never set foot before. Every single day for 7 days. Document each discovery.",c:"CHAOS",xp:40,diff:"Easy"},
{t:"Buy a lottery ticket every day for a week",d:"Different games each day. Track your wins and losses. At the end, calculate exactly what your odds were and how much you're down. Understand the mathematics of hope.",c:"CHAOS",xp:20,diff:"Easy"},
{t:"Say yes to everything for one full day",d:"Every request, every invitation, every suggestion from anyone you encounter. No exceptions (within safety and legality). See where a day of total openness takes you.",c:"CHAOS",xp:50,diff:"Medium"},
{t:"Send 10 postcards to random addresses",d:"Find addresses via PostCrossing, pen pal sites, or by opening a phone book to random pages. Write something real to each recipient. Drop them in the mail and wonder who reads them.",c:"CHAOS",xp:30,diff:"Easy"},
{t:"Go to a country you've never visited with no plan",d:"Book a flight. Pack a bag. Land. Figure out everything from the moment you arrive — where to sleep, eat, go. Improvise for 48+ hours. Navigate the unknown.",c:"CHAOS",xp:100,diff:"Hard"},
{t:"Pull an all-nighter doing something productive",d:"No partying. Use the full 24 hours to create something — write, code, build, paint, compose. Complete a significant project. Watch the sun come up while you're still working.",c:"CHAOS",xp:60,diff:"Medium"},
{t:"Challenge someone to a foot race",d:"In a park, on a street, at a party. Find someone who looks fast. Mark a course — 100 metres or similar. Race. Win or lose with grace.",c:"CHAOS",xp:40,diff:"Easy"},
{t:"Host a dinner where no one sees the menu",d:"Four courses. No one knows what they're eating until it's in front of them. Make each course surprising, unusual, but genuinely good. Describe each dish dramatically.",c:"CHAOS",xp:60,diff:"Medium"},
{t:"Do one thing every single day for 30 days",d:"Pick one discipline — push-ups, drawing, meditation, running, writing, cold showers. Do it every day without fail for 30 days. Miss a day and you start over.",c:"CHAOS",xp:90,diff:"Hard"},
{t:"Wear the same outfit for a full week",d:"Every day. Same clothes. Wash them if needed but wear the exact same thing. Track what people notice, what they say, and how you feel. Question why you own so many clothes.",c:"CHAOS",xp:30,diff:"Easy"},
{t:"Try a food from a culture you know nothing about",d:"Not the mainstream dish — the obscure one. Fermented, dried, raw, or intensely flavoured. Find a restaurant or market serving it. Ask questions. Eat it.",c:"CHAOS",xp:20,diff:"Easy"},
{t:"Delete social media apps for a month",d:"All of them — gone from every device. Replace the scrolling time with something that uses your hands. Notice how often you reach for your phone and find nothing.",c:"CHAOS",xp:70,diff:"Medium"},
{t:"Make a genuine bet on yourself",d:"Put money, reputation, or a public commitment on the line. Bet that you can achieve something you might fail at — a deadline, a performance, a transformation. Win it or learn from losing.",c:"CHAOS",xp:60,diff:"Medium"},
{t:"Spend a day doing everything with your non-dominant hand",d:"Writing, eating, brushing teeth, opening doors, using your phone. Every task. See what breaks, what adapts, and how your brain handles the constant friction.",c:"CHAOS",xp:30,diff:"Easy"},
{t:"Go one week without swearing",d:"No profanity at all — not even under your breath. Every slip resets the week to day zero. Reach 7 clean days. Notice what you use swearing to express.",c:"CHAOS",xp:30,diff:"Easy"},
{t:"Find and eat a dish that took 24+ hours to prepare",d:"Slow-cooked, fermented, aged, or traditionally prepared over a full day. Find the dish, learn how it was made, appreciate the time in every bite.",c:"CHAOS",xp:40,diff:"Easy"},
{t:"Spend an entire day outside",d:"From the moment you wake up until you go to sleep. No buildings. No cars except to get to nature. Rain, shine, cold — doesn't matter. Be outdoors for every waking hour.",c:"CHAOS",xp:50,diff:"Medium"},
{t:"Try a sensory overload experience",d:"A rave, a metal show front row, a fireworks display at close range, a crowded souk or market at peak hour. Let overwhelming sensory input wash over you without retreating.",c:"CHAOS",xp:40,diff:"Easy"},
{t:"Break a personal record",d:"Physical or mental — fastest mile, most push-ups, longest plank, highest typing speed, most pages read in a day. Set a baseline today. Smash it within the week.",c:"CHAOS",xp:50,diff:"Medium"},
{t:"Invent and cook a completely original dish",d:"No recipe. No inspiration from anything you've eaten before. Create a dish from pure invention. Name it. Eat it. Rate it honestly. Improve it or never make it again.",c:"CHAOS",xp:50,diff:"Medium"},
{t:"Enter a competition you've never tried",d:"Eating contest, hackathon, art competition, chess tournament, poetry slam, chili cook-off — any organised competition. Register. Show up. Compete. Don't come last.",c:"CHAOS",xp:60,diff:"Medium"},
{t:"Give away something you genuinely love",d:"A possession that means something to you. Give it to someone who will use it, treasure it, or need it more than you do. Don't replace it.",c:"CHAOS",xp:40,diff:"Easy"},
{t:"Go skinny dipping",d:"A lake, a secluded beach, a pool after hours, a river bend. Alone or with trusted friends. Leave your clothes on the bank. Get in. Feel completely free.",c:"CHAOS",xp:50,diff:"Medium"},
{t:"Volunteer for the hardest task",d:"In any group situation — work, social, community — when a difficult, unpleasant, or challenging task appears, be the first to raise your hand. Do it without complaining.",c:"CHAOS",xp:40,diff:"Easy"},
{t:"Make something and sell it to a stranger",d:"Anything you created — baked goods, art, a carved object, a knitted item, a plant cutting. Price it. Sell it to someone you don't know for actual money.",c:"CHAOS",xp:60,diff:"Medium"},
{t:"Go a day without looking in a mirror",d:"Cover them up if you have to. Don't check your reflection once. Notice how often you normally do. See what changes about how you feel in your body.",c:"CHAOS",xp:30,diff:"Easy"},
{t:"Read a book you've been avoiding for years",d:"The one sitting on your shelf that you bought with good intentions and never opened. Read every page. Find out why you were avoiding it.",c:"CHAOS",xp:30,diff:"Easy"},
{t:"Win an argument from the wrong side",d:"Take a position you don't actually hold. Enter a real debate with someone who agrees with your actual view. Win using only logic, rhetoric, and evidence. Then reveal what you did.",c:"CHAOS",xp:60,diff:"Medium"},
{t:"Get up and dance in public with no music",d:"In a park, on a sidewalk, in a shopping centre. No headphones. No music playing. Just you dancing to whatever's in your head. Own it completely.",c:"CHAOS",xp:40,diff:"Easy"},
{t:"Go a week with no excuses",d:"When something goes wrong or you fail at something, don't explain why. Accept full responsibility out loud. 'I messed up. That's on me.' No 'but.' No 'because.'",c:"CHAOS",xp:60,diff:"Medium"},
{t:"Try a discipline every day for a week, then quit if you hate it",d:"Pick something you've been curious about but skeptical of — Wim Hof breathing, ice baths, intermittent fasting, CrossFit, veganism. Commit fully for 7 days. On day 8, decide honestly.",c:"CHAOS",xp:50,diff:"Medium"},
{t:"Do a backflip off something",d:"Into water from a safe height. Off a diving board, a rock, a pier. Commit to the rotation. Land cleanly. Feel the world invert.",c:"CHAOS",xp:80,diff:"Hard"},
{t:"Shave your head or dramatically change your hair",d:"Not a trim. A transformation. Cut it all off, dye it an unexpected colour, do something you've been scared to do. Hair grows back. Fear doesn't leave on its own.",c:"CHAOS",xp:50,diff:"Medium"},
{t:"Try a completely new fitness regimen for a month",d:"Something you've never done — rock climbing, pole fitness, parkour, martial arts, dance. Commit for 4 weeks. See what your body can learn when you stop doing the same thing.",c:"CHAOS",xp:70,diff:"Medium"},
{t:"Eat only one colour of food for a day",d:"All red, all green, all white — every meal, every snack, every drink. See how hard it is. See what you learn about food variety.",c:"CHAOS",xp:30,diff:"Easy"},
{t:"Leave your phone at home for a full day",d:"Intentionally. Walk out the door without it. Navigate, communicate, and entertain yourself without the rectangle. Feel the phantom buzz that isn't there.",c:"CHAOS",xp:40,diff:"Easy"},
{t:"Do a random road trip with dice",d:"Assign directions to numbers (1=north, 2=south, etc.). At every junction, roll a die. Let chance decide where you end up. Drive for at least 3 hours.",c:"CHAOS",xp:60,diff:"Medium"},
{t:"Write a message to a random number",d:"Think of a number one digit off from someone you know. Text them something kind, mysterious, or funny. See if they respond. Document what happens.",c:"CHAOS",xp:20,diff:"Easy"},
{t:"Do a handstand every day for 30 days",d:"Even if you can't hold one. Kick up against a wall. Each day, try to hold it a little longer away from the wall. Track progress. See your world from upside down.",c:"CHAOS",xp:60,diff:"Medium"},
{t:"Sleep somewhere unexpected",d:"Not your bed. A hammock, a roof (safe and legal), a tent in the living room, a friend's floor, a forest clearing. Change where you close your eyes.",c:"CHAOS",xp:30,diff:"Easy"},
{t:"Go to an event you'd normally never attend",d:"A monster truck rally, a ballet, a wrestling match, a poetry reading, a religious service of a different faith. Go with an open mind. Stay for the whole thing.",c:"CHAOS",xp:40,diff:"Easy"},
{t:"Climb a tree to the highest safe point",d:"A tall, strong tree. Go as high as you safely can. Find a branch to sit on. Stay up there for 10 minutes. See the world from a different altitude.",c:"CHAOS",xp:40,diff:"Easy"},
{t:"Run through a field at full speed",d:"Find an open field. Sprint as fast as you can until you can't anymore. Feel your lungs burn. Collapse in the grass. Look at the sky.",c:"CHAOS",xp:30,diff:"Easy"},
{t:"Make a time capsule and bury it",d:"Include something that represents right now — a note, a photo, a small object, a news headline. Seal it well. Bury it somewhere you'll remember. Mark it with a date 5 years from now.",c:"CHAOS",xp:40,diff:"Easy"}
];

// Combine all quests and assign unique IDs
const ALL_QUESTS_RAW = [...RAW_QUESTS, ...EXTRA_QUESTS];
const ALL_QUESTS = ALL_QUESTS_RAW.map((q,i) => ({...q, id: i+1}));

// =====================================================================
// STATE
// =====================================================================
let state = {
  xp: 0,
  completedIds: [],
  activeIds: [],
  seenOrder: [],
  memories: {},
  xpHistory: [],
  currentFilter: 'ALL',
};

function saveState() {
  try { localStorage.setItem('sqstate', JSON.stringify(state)); } catch(e){}
}
function loadState() {
  try {
    const s = localStorage.getItem('sqstate');
    if(s) state = {...state, ...JSON.parse(s)};
  } catch(e){}
}

// =====================================================================
// QUEST LOGIC
// =====================================================================
let currentQuestId = null;
let displayedQuests = [];
let shuffleSeed = Date.now();

function seededShuffle(arr, seed) {
  const a = [...arr];
  let s = seed;
  for(let i = a.length-1; i>0; i--) {
    s = (s * 1103515245 + 12345) & 0x7fffffff;
    const j = s % (i+1);
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function getAvailableQuests() {
  return ALL_QUESTS.filter(q => !state.completedIds.includes(q.id));
}

function getDisplayedQuests() {
  let quests = getAvailableQuests();
  if(state.currentFilter !== 'ALL') quests = quests.filter(q => q.cat === state.currentFilter || q.c === state.currentFilter);
  const shuffled = seededShuffle(quests, shuffleSeed);
  return shuffled.slice(0, 30);
}

// =====================================================================
// LEVEL LOGIC
// =====================================================================
function getCurrentLevel() {
  let lv = LEVELS[0];
  for(const l of LEVELS) { if(state.xp >= l.xp) lv = l; }
  return lv;
}
function getNextLevel() {
  const idx = LEVELS.findIndex(l => l.lvl === getCurrentLevel().lvl);
  return LEVELS[idx+1] || null;
}
function getLevelProgress() {
  const cur = getCurrentLevel();
  const nxt = getNextLevel();
  if(!nxt) return 100;
  return Math.round(((state.xp - cur.xp) / (nxt.xp - cur.xp)) * 100);
}

// RENDER

function renderQuestCard(q, context='quests') {
  const isActive = state.activeIds.includes(q.id);
  const isCompleted = state.completedIds.includes(q.id);
  const xpClass = q.xp >= 80 ? 'high' : '';
  const catKey = q.c || q.cat;
  return `
  <div class="quest-card ${isCompleted?'completed':''}" onclick="openModal(${q.id})">
    <div class="quest-meta">
      <span class="cat-tag cat-${catKey}">${catKey}</span>
      <span class="xp-tag ${xpClass}">${q.xp} XP · ${q.diff}</span>
    </div>
    <div class="quest-title">${q.t}</div>
    ${context==='quests' ? '' : `<div class="quest-desc">${q.d.substring(0,80)}...</div>`}
    <div class="quest-actions" onclick="event.stopPropagation()">
      ${isCompleted
        ? `<span class="btn-sm done">✓ Done</span>`
        : isActive
          ? `<button class="btn-sm primary" onclick="completeQuestById(${q.id})">Complete</button><button class="btn-sm" onclick="openModal(${q.id})">Details</button>`
          : `<button class="btn-sm primary" onclick="acceptQuestById(${q.id})">Accept</button><button class="btn-sm" onclick="openModal(${q.id})">Details</button>`
      }
    </div>
  </div>`;
}

function renderQuestList() {
  displayedQuests = getDisplayedQuests();
  const el = document.getElementById('quest-list');
  const countEl = document.getElementById('quest-count');
  const catKey = state.currentFilter === 'ALL' ? '' : ` in ${state.currentFilter}`;
  if(displayedQuests.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="big-icon">🎉</div><p>All quests in this category completed!<br>You're a legend.</p></div>`;
    countEl.textContent = '0 quests';
    return;
  }
  countEl.textContent = `${displayedQuests.length} quests`;
  el.innerHTML = displayedQuests.map(q => renderQuestCard(q, 'quests')).join('');
}

function renderActiveList() {
  const quests = ALL_QUESTS.filter(q => state.activeIds.includes(q.id));
  const el = document.getElementById('active-list');
  document.getElementById('active-count').textContent = quests.length;
  if(!quests.length) { el.innerHTML = `<div class="empty-state"><div class="big-icon">⚡</div><p>No active quests.<br>Head to Quests and accept one.</p></div>`; return; }
  el.innerHTML = quests.map(q => renderQuestCard(q, 'active')).join('');
}

function renderCompletedList() {
  const quests = ALL_QUESTS.filter(q => state.completedIds.includes(q.id)).reverse();
  const el = document.getElementById('completed-list');
  document.getElementById('completed-count').textContent = quests.length;
  if(!quests.length) { el.innerHTML = `<div class="empty-state"><div class="big-icon">🏆</div><p>No completed quests yet.<br>Go do something wild.</p></div>`; return; }
  el.innerHTML = quests.map(q => renderQuestCard(q, 'completed')).join('');

function renderStats() {
  const cats = ['ADVENTURE','SKILLS','SOCIAL','URBAN','MIND','CHAOS'];
  const catColors = [CAT_COLORS.ADVENTURE, CAT_COLORS.SKILLS, CAT_COLORS.SOCIAL, CAT_COLORS.URBAN, CAT_COLORS.MIND, CAT_COLORS.CHAOS];
  const counts = {};
  cats.forEach(c => counts[c] = 0);
  state.completedIds.forEach(id => {
    const q = ALL_QUESTS.find(x => x.id===id);
    if(q) counts[q.c || q.cat] = (counts[q.c || q.cat]||0)+1;
  });
  const maxCount = Math.max(...Object.values(counts), 1);
  const el = document.getElementById('cat-bar-chart');
  el.innerHTML = cats.map((c,i) => `
    <div class="bar-row">
      <div class="bar-label">${c.charAt(0)+c.slice(1).toLowerCase()}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(counts[c]/maxCount*100)}%;background:${catColors[i]}"></div></div>
      <div class="bar-count">${counts[c]}</div>
    </div>`).join('');

  const canvas = document.getElementById('xp-chart');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * window.devicePixelRatio || 600;
  canvas.height = 120 * window.devicePixelRatio || 120;
  ctx.scale(window.devicePixelRatio||1, window.devicePixelRatio||1);
  const w = canvas.offsetWidth || 300;
  const h = 120;
  ctx.clearRect(0,0,w,h);
  const hist = state.xpHistory.slice(-14);
  if(hist.length > 1) {
    const maxXp = Math.max(...hist.map(x=>x.cumXp),1);
    const pts = hist.map((x,i) => [i/(hist.length-1)*w, h - (x.cumXp/maxXp)*(h-16) - 8]);
    ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
    pts.forEach(p => ctx.lineTo(p[0],p[1]));
    ctx.strokeStyle = '#8FAE8B'; ctx.lineWidth = 2; ctx.stroke();
    ctx.lineTo(w,h); ctx.lineTo(0,h); ctx.closePath();
    ctx.fillStyle = 'rgba(143,174,139,0.15)'; ctx.fill();
    pts.forEach(p => { ctx.beginPath(); ctx.arc(p[0],p[1],3,0,Math.PI*2); ctx.fillStyle='#8FAE8B'; ctx.fill(); });
  } else {
    ctx.fillStyle = '#9B9B92'; ctx.font = '13px Space Grotesk'; ctx.textAlign='center';
    ctx.fillText('Complete quests to see XP history', w/2, h/2);
  }

  const recent = ALL_QUESTS.filter(q => state.completedIds.includes(q.id)).slice(-5).reverse();
  const rEl = document.getElementById('recent-completed');
  if(!recent.length) { rEl.innerHTML = `<p style="color:var(--gray);font-size:13px">No completions yet.</p>`; return; }
  rEl.innerHTML = recent.map(q => `
    <div class="recent-item">
      <div class="recent-dot"></div>
      <div class="recent-name">${q.t}</div>
      <div class="recent-xp">+${q.xp} XP</div>
    </div>`).join('');
}

function renderLevels() {
  const cur = getCurrentLevel();
  const nxt = getNextLevel();
  const prog = getLevelProgress();
  document.getElementById('lv-big').textContent = cur.lvl;
  document.getElementById('lv-title').textContent = cur.name;
  document.getElementById('lv-progress').style.width = prog+'%';
  document.getElementById('lv-xp-label').textContent = nxt ? `${state.xp} / ${nxt.xp} XP` : `${state.xp} XP — MAX LEVEL`;
  document.getElementById('stat-total-xp').textContent = state.xp;
  document.getElementById('stat-done').textContent = state.completedIds.length;
  document.getElementById('stat-streak').textContent = calculateStreak();
  const cats = new Set(state.completedIds.map(id => { const q=ALL_QUESTS.find(x=>x.id===id); return q?q.c||q.cat:''; }));
  cats.delete('');
  document.getElementById('stat-cats').textContent = cats.size;

  const el = document.getElementById('level-list');
  el.innerHTML = LEVELS.map(l => {
    const reached = state.xp >= l.xp;
    const isCur = l.lvl === cur.lvl;
    return `<div class="level-row">
      <div class="lv-circle ${reached&&!isCur?'reached':''} ${isCur?'current':''}">${l.lvl}</div>
      <div class="lv-info"><div class="lv-name">${l.name}</div><div class="lv-xp">${l.xp} XP</div></div>
      ${isCur ? '<span style="font-size:12px;color:var(--sage);font-weight:600">YOU ARE HERE</span>' : ''}
    </div>`;
  }).join('');

  document.getElementById('xp-bar').style.width = prog+'%';
  document.getElementById('level-badge').textContent = `LVL ${cur.lvl}`;
}

function calculateStreak() {
  if(!state.xpHistory.length) return 0;
  let streak = 0;
  const today = new Date().toDateString();
  const hist = [...state.xpHistory].reverse();
  let checkDate = new Date();
  for(const entry of hist) {
    if(new Date(entry.date).toDateString() === checkDate.toDateString()) {
      streak++;
      checkDate.setDate(checkDate.getDate()-1);
    } else break;
  }
  return streak;
}

function openModal(questId) {
  const q = ALL_QUESTS.find(x => x.id===questId);
  if(!q) return;
  currentQuestId = questId;
  const catKey = q.c || q.cat;
  document.getElementById('m-cat').textContent = catKey;
  document.getElementById('m-cat').className = `modal-cat cat-tag cat-${catKey}`;
  document.getElementById('m-title').textContent = q.t;
  document.getElementById('m-desc').textContent = q.d;
  document.getElementById('m-xp').textContent = `+${q.xp} XP`;
  document.getElementById('m-diff').textContent = `Difficulty: ${q.diff}`;

  const isActive = state.activeIds.includes(questId);
  const isCompleted = state.completedIds.includes(questId);
  const acceptBtn = document.getElementById('m-accept-btn');
  const doneBtn = document.getElementById('m-done-btn');
  const memSection = document.getElementById('memory-section');

  if(isCompleted) {
    acceptBtn.style.display='block'; acceptBtn.textContent='✓ Completed'; acceptBtn.disabled=true; acceptBtn.style.opacity='0.5';
    doneBtn.style.display='none';
    memSection.style.display='block';
  } else if(isActive) {
    acceptBtn.style.display='none'; doneBtn.style.display='block';
    memSection.style.display='block';
    acceptBtn.disabled=false; acceptBtn.style.opacity='1';
  } else {
    acceptBtn.style.display='block'; doneBtn.style.display='none';
    acceptBtn.textContent='Accept Quest'; acceptBtn.disabled=false; acceptBtn.style.opacity='1';
    memSection.style.display='none';
  }

  renderMemories(questId);
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if(!e || e.target===document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
    currentQuestId = null;
  }
}

function acceptQuest() {
  if(!currentQuestId) return;
  if(state.completedIds.includes(currentQuestId)) return;
  if(!state.activeIds.includes(currentQuestId)) {
    state.activeIds.push(currentQuestId);
    saveState();
    showToast('Quest accepted! ⚡');
    document.getElementById('m-accept-btn').style.display='none';
    document.getElementById('m-done-btn').style.display='block';
    document.getElementById('memory-section').style.display='block';
    renderActiveList();
    renderQuestList();
  }
}

function acceptQuestById(id) {
  if(state.completedIds.includes(id)) return;
  if(!state.activeIds.includes(id)) {
    state.activeIds.push(id);
    saveState();
    showToast('Quest accepted! ⚡');
    renderQuestList();
    renderActiveList();
  }
}

function completeQuest() {
  if(!currentQuestId) return;
  completeQuestById(currentQuestId);
  closeModal();
}

function completeQuestById(id) {
  if(state.completedIds.includes(id)) return;
  const q = ALL_QUESTS.find(x=>x.id===id);
  if(!q) return;
  state.completedIds.push(id);
  state.activeIds = state.activeIds.filter(x=>x!==id);
  state.xp += q.xp;

  const today = new Date().toISOString().split('T')[0];
  const lastEntry = state.xpHistory[state.xpHistory.length-1];
  if(lastEntry && lastEntry.date === today) {
    lastEntry.xp += q.xp; lastEntry.cumXp = state.xp;
  } else {
    state.xpHistory.push({date:today, xp:q.xp, cumXp:state.xp});
  }

  saveState();
  showToast(`+${q.xp} XP earned! 🔥`);
  renderAll();
}

// =====================================================================
// MEMORIES
// =====================================================================
function renderMemories(questId) {
  const mems = state.memories[questId] || [];
  const grid = document.getElementById('memory-grid');
  if(!mems.length) { grid.innerHTML=''; return; }
  grid.innerHTML = mems.map((m,i) =>
    m.type==='img'
      ? `<img class="memory-thumb" src="${m.data}" onclick="viewMemory(${questId},${i})">`
      : `<div class="memory-thumb-video" onclick="viewMemory(${questId},${i})">▶</div>`
  ).join('');
}

function addMemory(event) {
  const files = Array.from(event.target.files);
  if(!currentQuestId || !files.length) return;
  if(!state.memories[currentQuestId]) state.memories[currentQuestId]=[];
  let loaded=0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      state.memories[currentQuestId].push({type: file.type.startsWith('video')?'vid':'img', data: e.target.result});
      loaded++;
      if(loaded===files.length) { saveState(); renderMemories(currentQuestId); showToast('Memory saved 📸'); }
    };
    reader.readAsDataURL(file);
  });
  event.target.value='';
}

function viewMemory(questId, idx) {
  const m = (state.memories[questId]||[])[idx];
  if(!m) return;
  const w = window.open('','_blank');
  if(m.type==='img') { w.document.write(`<img src="${m.data}" style="max-width:100%;max-height:100vh">`); }
  else { w.document.write(`<video src="${m.data}" controls autoplay style="max-width:100%;max-height:100vh"></video>`); }
}

// =====================================================================
// TABS & FILTERS
// =====================================================================
let currentTab = 'quests';
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  event.currentTarget.classList.add('active');
  if(tab==='stats') renderStats();
  else if(tab==='levels') renderLevels();
  else if(tab==='completed') renderCompletedList();
  else if(tab==='active') renderActiveList();
  else renderQuestList();
}

function filterCat(cat) {
  state.currentFilter = cat;
  document.querySelectorAll('.filter-pill').forEach(p => {
    p.classList.toggle('active', p.textContent.toUpperCase()===cat || (cat==='ALL' && p.textContent==='All'));
  });
  renderQuestList();
}

function shuffleQuests() {
  shuffleSeed = Date.now();
  renderQuestList();
  const btn = document.querySelector('.shuffle-btn svg');
  btn.style.transform = 'rotate(360deg)';
  setTimeout(()=>btn.style.transform='rotate(0deg)',500);
}

// =====================================================================
// TOAST
// =====================================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

// =====================================================================
// INIT
// =====================================================================
function renderAll() {
  renderQuestList();
  renderActiveList();
  renderCompletedList();
  renderLevels();
}

loadState();
renderAll();
</script>
</body>
</html>
